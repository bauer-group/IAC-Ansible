---
- name: Verify
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Verify update script is deployed
      ansible.builtin.stat:
        path: /usr/local/sbin/iac-auto-update.sh
      register: auto_update_script_stat
      failed_when: not auto_update_script_stat.stat.exists or not auto_update_script_stat.stat.executable

    - name: Verify cron job is configured
      ansible.builtin.command: crontab -l
      register: auto_update_cron_result
      changed_when: false
      failed_when: "'iac-auto-update' not in auto_update_cron_result.stdout"

    - name: Verify log directory exists
      ansible.builtin.stat:
        path: /var/log
      register: auto_update_logdir_stat
      failed_when: not auto_update_logdir_stat.stat.exists

    - name: Verify iac-ansible config directory exists
      ansible.builtin.stat:
        path: /etc/iac-ansible
      register: auto_update_confdir_stat
      failed_when: not auto_update_confdir_stat.stat.exists
