---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    auto_update_enabled: true
    auto_update_type: "all"
    auto_update_reboot_enabled: false
    auto_update_statusmon_enabled: false
    auto_update_chain_ansible_pull: false
    # common runs as dependency — disable host-level tasks that don't
    # work in the bind-mounted test container filesystem or break
    # idempotency in isolated containers.
    common_hostname_configure: false
    common_ntp_configure: false

  roles:
    - role: auto_update
