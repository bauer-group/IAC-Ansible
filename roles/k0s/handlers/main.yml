---
# =============================================================================
# k0s Role - Handlers
# =============================================================================

- name: Restart k0scontroller
  ansible.builtin.systemd:
    name: k0scontroller
    state: restarted
    daemon_reload: true
  when: k0s_role in ["controller", "controller+worker"]

- name: Restart k0sworker
  ansible.builtin.systemd:
    name: k0sworker
    state: restarted
    daemon_reload: true
  when: k0s_role == "worker"

- name: Reload sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true

- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart wg-quick wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    state: restarted
    daemon_reload: true

- name: Apply k0s netplan
  ansible.builtin.command: netplan apply
  changed_when: true
