---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/../../requirements.yml

driver:
  name: docker

platforms:
  - name: molecule-k0s-ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  - name: molecule-k0s-ubuntu2604
    image: geerlingguy/docker-ubuntu2604-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  - name: molecule-k0s-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  # NOTE: Rocky 9/10 platforms temporarily excluded.
  # The geerlingguy/docker-rockylinux*-ansible images become UNREACHABLE
  # immediately after container start in the self-hosted DinD runner
  # (Ansible reports 'Failed to create temporary directory' before any
  # task can run). Debian/Ubuntu platforms are unaffected. Re-add the
  # rocky blocks once the docker-exec / container init issue is debugged.

provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
    ANSIBLE_FILTER_PLUGINS: "${MOLECULE_PROJECT_DIRECTORY}/../../filter_plugins"
  inventory:
    group_vars:
      all:
        ansible_become_method: su
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible
