---
# =============================================================================
# k0s Role - Bootstrap (first controller of a cluster)
# =============================================================================
# Runs ONLY on the host carrying k0s_bootstrap_node: true.
#
# Responsibilities:
#   1. If etcd not initialised → `k0s install controller --enable-worker`, start
#   2. Wait for the local API to become ready
#   3. Mint fresh join-tokens (controller + worker) with TTL k0s_token_ttl
#   4. Publish tokens to Vault for joiners to consume
# =============================================================================

- name: "[k0s][bootstrap] Detect existing etcd state"
  ansible.builtin.stat:
    path: "{{ k0s_data_dir }}/pki/etcd/ca.crt"
  register: k0s_etcd_ca_stat

- name: "[k0s][bootstrap] Determine controller install flags"
  ansible.builtin.set_fact:
    k0s_controller_install_flags: >-
      {{ '--enable-worker' if k0s_role == 'controller+worker' else '' }}

- name: "[k0s][bootstrap] Install controller (first run only)"
  ansible.builtin.command:
    cmd: >-
      {{ k0s_install_path }} install controller
      --config {{ k0s_config_dir }}/k0s.yaml
      {{ k0s_controller_install_flags }}
  changed_when: true
  when: not k0s_etcd_ca_stat.stat.exists

- name: "[k0s][bootstrap] Start controller service"
  ansible.builtin.systemd:
    name: k0scontroller
    state: started
    enabled: true
    daemon_reload: true

- name: "[k0s][bootstrap] Wait for kube-apiserver readyz"
  ansible.builtin.uri:
    url: "https://127.0.0.1:6443/readyz"
    method: GET
    validate_certs: false
    status_code: [200]
  register: k0s_apiserver_ready
  retries: 60
  delay: 5
  until: k0s_apiserver_ready.status == 200

# --- Token minting + Vault publish ----------------------------------------

- name: "[k0s][bootstrap] Mint controller join-token"
  ansible.builtin.command:
    cmd: >-
      {{ k0s_install_path }} token create
      --role=controller
      --expiry={{ k0s_token_ttl }}
      --config {{ k0s_config_dir }}/k0s.yaml
  register: k0s_token_controller
  changed_when: true
  no_log: true

- name: "[k0s][bootstrap] Mint worker join-token"
  ansible.builtin.command:
    cmd: >-
      {{ k0s_install_path }} token create
      --role=worker
      --expiry={{ k0s_token_ttl }}
      --config {{ k0s_config_dir }}/k0s.yaml
  register: k0s_token_worker
  changed_when: true
  no_log: true

- name: "[k0s][bootstrap] Publish tokens to Vault"
  community.hashi_vault.vault_kv2_write:
    url: "{{ secrets_vault_addr }}"
    auth_method: "{{ secrets_vault_auth_method }}"
    role_id: "{{ lookup('file', secrets_vault_role_id_file) }}"
    secret_id: "{{ lookup('file', secrets_vault_secret_id_file) }}"
    engine_mount_point: "{{ k0s_vault_kv_mount }}"
    path: "{{ k0s_token_secret_path }}"
    data:
      controller_token: "{{ k0s_token_controller.stdout }}"
      worker_token: "{{ k0s_token_worker.stdout }}"
      issued: "{{ ansible_date_time.iso8601 }}"
      ttl: "{{ k0s_token_ttl }}"
      bootstrap_node: "{{ inventory_hostname }}"
  no_log: true
