---
galaxy_info:
  role_name: k0s
  namespace: bauer_group
  author: BAUER GROUP
  description: >-
    Bare-metal Kubernetes via k0s with two network modes — VLAN (datacenter)
    and WireGuard full-mesh overlay (public network). Pure ansible-pull
    bootstrap with HashiCorp Vault for join-token distribution.
  license: MIT
  min_ansible_version: "2.18"
  platforms:
    - name: Ubuntu
      versions: [jammy, noble, resolute]
    - name: Debian
      versions: [trixie]
    - name: EL
      versions:
        - "all"

# No meta dependencies — `common` and `secrets` are run as separate plays
# in playbooks/site.yml (Phase 0 + Phase 1) BEFORE Phase 7 (k0s). Declaring
# them here would force molecule to load common into every k0s test scenario,
# which fails on Docker's bind-mounted /etc/hosts (common's hostname task).
# Production ordering is enforced by site.yml, not by meta-deps.
dependencies: []
