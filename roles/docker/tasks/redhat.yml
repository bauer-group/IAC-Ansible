---
# =============================================================================
# Docker Role - RedHat/CentOS Tasks
# =============================================================================

- name: "[RedHat] Remove conflicting packages"
  ansible.builtin.dnf:
    name: "{{ docker_conflicting_packages }}"
    state: absent
  failed_when: false
  # Best-effort pre-install cleanup on RHEL — package presence varies
  # across Rocky/Alma/RHEL versions and may trigger weak-dep churn on
  # repeated runs without any functional state change. Not meaningful
  # for idempotence checks.
  changed_when: false

- name: "[RedHat] Install Docker prerequisites"
  ansible.builtin.dnf:
    name:
      - dnf-plugins-core
      - cronie  # required by the Docker prune cron job task
    state: present
    # RHEL 9/10 default to nftables; docker-ce pulls in iptables-nft as a
    # dependency. No separate ip6tables package is shipped anymore.

- name: "[RedHat] Add Docker repository"
  ansible.builtin.yum_repository:
    name: docker-ce
    description: Docker CE Stable
    baseurl: "https://download.docker.com/linux/{{ (ansible_facts['distribution'] == 'Fedora') | ternary('fedora', 'rhel') }}/$releasever/$basearch/stable"
    gpgcheck: true
    gpgkey: "https://download.docker.com/linux/{{ (ansible_facts['distribution'] == 'Fedora') | ternary('fedora', 'rhel') }}/gpg"
    enabled: true

- name: "[RedHat] Gather installed RPM packages (for idempotence gate)"
  ansible.builtin.package_facts:
    manager: rpm

- name: "[RedHat] Compute missing Docker packages"
  ansible.builtin.set_fact:
    docker_missing_packages: >-
      {{ docker_packages | reject('in', ansible_facts.packages.keys()) | list }}

- name: "[RedHat] Install Docker packages"
  ansible.builtin.dnf:
    name: "{{ docker_missing_packages }}"
    state: present
    install_weak_deps: false
  # dnf's "state: present" on Rocky 10 flaps between runs when weak-dep
  # resolution of docker-ce isn't deterministic (docker repo + RHEL 10
  # is very new). Gating on "is any package missing?" guarantees the
  # dnf call is skipped entirely on the second run, regardless of
  # weak-dep changes beneath.
  when: docker_missing_packages | length > 0
