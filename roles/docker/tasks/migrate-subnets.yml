---
# =============================================================================
# Docker Role - Subnet Migration Drain (opt-in via docker_migrate_subnets)
# =============================================================================
# Brings the host into a state where the next daemon.json deployment + Docker
# restart can recreate docker0 and the default address pools cleanly.
#
# Idempotent: the drain block is gated on a runtime check that compares the
# current docker0 IPv6 address against docker_daemon_options['fixed-cidr-v6'].
# Once docker0 is already on the target prefix the entire block is skipped,
# so repeated deploys on a migrated host do not stop containers or restart
# Docker unnecessarily.
#
# Destructive when triggered: stops all running containers and removes unused
# networks. Intended for disposable/staging hosts. Do NOT enable on production
# without a maintenance window.
# =============================================================================

- name: Check whether Docker CLI is present (skip migration on fresh hosts)
  ansible.builtin.command: command -v docker
  register: docker_cli_path
  changed_when: false
  failed_when: false

- name: Detect current docker0 IPv6 subnet state
  ansible.builtin.shell: |
    set -o pipefail
    if ! ip link show docker0 >/dev/null 2>&1; then
      echo "no-bridge"
      exit 0
    fi
    target_prefix="{{ docker_daemon_options['fixed-cidr-v6'] | regex_replace('::?/.*$', '') }}"
    if ip -6 addr show docker0 2>/dev/null | grep -qE "inet6 ${target_prefix}:"; then
      echo "current"
    else
      echo "stale"
    fi
  args:
    executable: /bin/bash
  register: docker_bridge_state
  changed_when: false
  when: docker_cli_path.rc == 0

- name: Report subnet migration not needed
  ansible.builtin.debug:
    msg: >-
      Docker subnet migration skipped — docker0 state is
      '{{ docker_bridge_state.stdout }}'
      (target prefix {{ docker_daemon_options['fixed-cidr-v6'] }}).
  when:
    - docker_cli_path.rc == 0
    - docker_bridge_state.stdout in ['current', 'no-bridge']

- name: Run subnet migration drain
  when:
    - docker_cli_path.rc == 0
    - docker_bridge_state.stdout == 'stale'
  block:
    - name: Stop all running containers before bridge teardown
      ansible.builtin.shell: |
        set -eo pipefail
        ids=$(docker ps -q)
        if [ -n "$ids" ]; then
          docker stop $ids
          echo "stopped"
        else
          echo "none"
        fi
      args:
        executable: /bin/bash
      register: docker_migrate_stopped
      changed_when: docker_migrate_stopped.stdout == "stopped"

    - name: Prune unused networks (forces recreation under new pool)
      ansible.builtin.command: docker network prune -f
      register: docker_migrate_prune
      changed_when: docker_migrate_prune.stdout_lines | length > 1

    - name: Stop docker.socket to prevent activation during teardown
      ansible.builtin.systemd:
        name: docker.socket
        state: stopped
      failed_when: false

    - name: Stop docker.service so docker0 can be removed
      ansible.builtin.systemd:
        name: docker.service
        state: stopped

    - name: Stop docker-support.service (clears handler-bound state)
      ansible.builtin.systemd:
        name: docker-support.service
        state: stopped
      failed_when: false

    - name: Enumerate stale IPv6 NAT POSTROUTING rules (source != current subnet)
      ansible.builtin.shell: |
        set -o pipefail
        ip6tables -t nat -S POSTROUTING 2>/dev/null \
          | grep -E -- '! -o docker0 -j MASQUERADE' \
          | grep -v -- '-s {{ docker_ipv6_nat_subnet }} ' \
          || true
      args:
        executable: /bin/bash
      register: docker_migrate_stale_rules
      changed_when: false

    - name: Remove stale IPv6 NAT POSTROUTING rules
      ansible.builtin.command:
        argv: "{{ ['ip6tables', '-t', 'nat'] + (item | regex_replace('^-A ', '-D ') | split) }}"
      loop: "{{ docker_migrate_stale_rules.stdout_lines }}"
      when: docker_migrate_stale_rules.stdout_lines | length > 0

    - name: Delete docker0 bridge so it gets recreated with new IPv6 range
      ansible.builtin.command: ip link delete docker0
      register: docker_migrate_link_del
      failed_when:
        - docker_migrate_link_del.rc != 0
        - "'Cannot find device' not in docker_migrate_link_del.stderr"
      changed_when: docker_migrate_link_del.rc == 0
