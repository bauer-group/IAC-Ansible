---
- name: Verify
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Verify docker-ce package is installed (Debian/Ubuntu)
      ansible.builtin.command: dpkg-query -W -f='${Status}' docker-ce
      register: docker_package_status
      changed_when: false
      failed_when: "'install ok installed' not in docker_package_status.stdout"
      when: ansible_facts['os_family'] == "Debian"

    - name: Verify docker-ce package is installed (RedHat)
      ansible.builtin.command: rpm -q docker-ce
      register: docker_package_status_rpm
      changed_when: false
      failed_when: docker_package_status_rpm.rc != 0
      when: ansible_facts['os_family'] == "RedHat"

    - name: Verify daemon.json exists
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: docker_daemon_json_stat
      failed_when: not docker_daemon_json_stat.stat.exists

    - name: Verify daemon.json is valid JSON
      ansible.builtin.command: python3 -c "import json; json.load(open('/etc/docker/daemon.json'))"
      changed_when: false

    - name: Verify sysctl config deployed
      ansible.builtin.stat:
        path: /etc/sysctl.d/98-docker.conf
      register: docker_sysctl_stat
      failed_when: not docker_sysctl_stat.stat.exists

    - name: Verify prune cron job exists
      ansible.builtin.command: crontab -l
      register: docker_cron_result
      changed_when: false
      failed_when: "'docker image prune' not in docker_cron_result.stdout"
