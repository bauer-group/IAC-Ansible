---
- name: Verify
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Verify Docker is installed
      ansible.builtin.command: docker version --format '{{ '{{' }}.Server.Version{{ '}}' }}'
      register: docker_version
      changed_when: false
      failed_when: docker_version.rc != 0

    - name: Verify Docker service is running
      ansible.builtin.systemd:
        name: docker
      register: docker_service
      failed_when: docker_service.status.ActiveState != "active"

    - name: Verify daemon.json exists
      ansible.builtin.stat:
        path: /etc/docker/daemon.json
      register: daemon_json
      failed_when: not daemon_json.stat.exists

    - name: Verify daemon.json is valid JSON
      ansible.builtin.command: python3 -c "import json; json.load(open('/etc/docker/daemon.json'))"
      changed_when: false

    - name: Verify sysctl config deployed
      ansible.builtin.stat:
        path: /etc/sysctl.d/98-docker.conf
      register: sysctl_stat
      failed_when: not sysctl_stat.stat.exists

    - name: Verify prune cron job exists
      ansible.builtin.command: crontab -l
      register: cron_result
      changed_when: false
      failed_when: "'docker image prune' not in cron_result.stdout"
