---
# =============================================================================
# Docker Role Defaults
# =============================================================================

# Enable/disable Docker installation
docker_enabled: true

# Docker edition: "ce" (Community) or "ee" (Enterprise)
docker_edition: "ce"

# Docker packages to install
docker_packages:
  - "docker-{{ docker_edition }}"
  - "docker-{{ docker_edition }}-cli"
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# --- APT repository codename selection (Debian/Ubuntu) ---
# Docker's CDN (download.docker.com) publishes apt repos per distro codename,
# but lags brand-new releases by weeks/months — e.g. Ubuntu 26.04 "resolute"
# has no repo yet at release time. tasks/debian.yml probes the CDN at runtime
# and uses the host's native codename when it is published; otherwise it falls
# back to the newest codename Docker reliably ships for that distribution.
# Docker .debs are forward-compatible across releases of the same distribution,
# so a resolute host on the noble repo is safe and supported.
# The probe is self-healing: once Docker publishes the native codename, the
# next run switches to it automatically — no edit to this map required.
docker_apt_codename_fallback:
  Ubuntu: noble     # newest Ubuntu LTS Docker publishes
  Debian: bookworm  # newest Debian stable Docker reliably publishes

# Conflicting packages to remove before installation
docker_conflicting_packages:
  - docker.io
  - docker-doc
  - docker-compose
  - docker-compose-v2
  - podman-docker
  - containerd
  - runc

# Docker daemon configuration
docker_daemon_options:
  bip: "10.0.0.1/9"
  ipv6: true
  fixed-cidr-v6: "fd10::/49"
  default-address-pools:
    - base: "10.128.0.0/9"
      size: 24
    - base: "fd10:0:0:8000::/49"
      size: 64
  log-driver: "json-file"
  log-opts:
    max-size: "10m"
    max-file: "3"
  storage-driver: "overlay2"

# IPv6 NAT masquerading for Docker containers
docker_ipv6_nat_enabled: true
docker_ipv6_nat_subnet: "fd10::/48"

# Sysctl settings for Docker workloads
docker_sysctl:
  vm.max_map_count: 4194304

# Prune unused resources on a schedule (cron)
docker_prune_enabled: true
docker_prune_cron_hour: "4"
docker_prune_cron_minute: "30"
docker_prune_cron_weekday: "0"
# Retention: only prune images older than this (protects recently pulled production images)
docker_prune_image_retention: "240h"
