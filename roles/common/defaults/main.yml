---
# Common role defaults
common_packages_install: true
common_timezone_configure: true
common_ntp_configure: true
common_motd_configure: true
common_logdir_configure: true

# Locale
common_locale: "de_DE.UTF-8"
common_locale_configure: true

# DNS resolver hardening
common_resolved_configure: true
common_resolved_multicast_dns: "no"
common_resolved_dns_stub_listener: "no"
common_resolved_dns_servers:
  - 1.1.1.1
  - 1.0.0.1
  - 8.8.8.8
  - 8.8.4.4
common_resolved_dns_servers_v6:
  - 2606:4700:4700::1111
  - 2606:4700:4700::1001
  - 2001:4860:4860::8888
  - 2001:4860:4860::8844
common_resolved_fallback_dns:
  - 9.9.9.9
  - 149.112.112.112

# fail2ban
common_fail2ban_enabled: true
common_fail2ban_sshd_bantime: 86400
common_fail2ban_sshd_findtime: 900
common_fail2ban_sshd_maxretry: 5

# Open file limits (important for Docker, databases, etc.)
common_nofile_limit_configure: true
common_nofile_limit: 1048576

# NTP tuning
ntp_root_distance_max_sec: 3
ntp_poll_interval_min_sec: 32
ntp_poll_interval_max_sec: 2048
ntp_connection_retry_sec: 30
ntp_save_interval_sec: 60

# Mail relay (msmtp) - used by smartd, fail2ban, cron etc.
common_msmtp_enabled: true
common_msmtp_host: "mx1.simply-send.com"
common_msmtp_port: 465
common_msmtp_tls_starttls: "off"
common_msmtp_user: "no-reply@simply-send.com"
common_msmtp_from: "no-reply@simply-send.com"
# Password MUST be set via Ansible Vault:
#   common_msmtp_password: "{{ vault_msmtp_password }}"
common_msmtp_password: ""

# SSH hardening (disabled by default - enable per host only!)
# Will REFUSE to harden if no SSH keys are deployed for the target user.
common_ssh_hardening: false
common_ssh_permit_root_login: "prohibit-password"
common_ssh_password_authentication: "no"
common_ssh_authorized_keys_user: "root"

# SSH key sources (combined: GitHub + Vault)
# GitHub: list of GitHub usernames - keys fetched from github.com/<user>.keys
common_ssh_github_users: []
# Vault: list of additional public keys (use ansible-vault for encryption)
common_ssh_extra_keys: []
# Example:
#   common_ssh_github_users: ["karl-bauer", "ops-team-member"]
#   common_ssh_extra_keys: ["{{ vault_ssh_key_deploy_bot }}"]
