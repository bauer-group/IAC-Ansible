---
# Common role defaults
common_packages_install: true
common_timezone_configure: true
common_ntp_configure: true
common_motd_configure: true
common_logdir_configure: true

# Hardware-specific package selection — auto-detected from facts, overridable per host.
# ansible_facts['virtualization_role'] values:
#   "guest" → VM guest (KVM, VMware, Hyper-V, Xen, ...)
#   "host"  → bare metal running hypervisors
#   "NA"    → bare metal
common_install_vm_tools: "{{ ansible_facts['virtualization_role'] | default('NA') == 'guest' }}"
common_install_physical_tools: "{{ ansible_facts['virtualization_role'] | default('NA') != 'guest' }}"

# Hostname management
# Idempotent: only changes the hostname when it differs from inventory_hostname.
# Default ON because the inventory is authoritative. Disable per host for
# systems where the hostname is set elsewhere (DHCP, external provisioning).
common_hostname_configure: true

# UFW firewall management
# State: "unmanaged" (default — retrofit-safe for hosts using firewalld /
#                     cloud security groups / manual iptables),
#        "disabled"  (match Docker-host manual setup),
#        "enabled"   (ensure UFW is running; rules managed elsewhere)
common_firewall_ufw_state: "unmanaged"

# AppArmor management
# State: "disabled" (default — causes too many Docker/container/Coolify issues),
#        "enabled", "unmanaged" (skip role entirely)
common_apparmor_state: "disabled"

# --- Optional Netplan management (Debian/Ubuntu) ---
# Safety: default off. Enable per-host only.
# Philosophy: specify only what needs to be added/corrected — everything else
# is inherited from the currently running network configuration.
common_netplan_configure: false
common_netplan_remove_existing: true
common_netplan_filename: "/etc/netplan/01-iac-network.yaml"

# Interface: empty = auto-detect from current default route
common_netplan_interface: ""
# MAC match: optional — leave empty when only one NIC is present
common_netplan_match_mac: ""
common_netplan_renderer: "networkd"

# IPv4 override — if empty, keep current primary address
common_netplan_ipv4_addresses: []
# IPv4 extra — ALWAYS appended (for booked additional addresses)
common_netplan_ipv4_extra: []
# IPv4 gateway — if empty, keep current default gateway
common_netplan_ipv4_gateway: ""

# IPv6 override — if empty, keep current global-scope addresses
common_netplan_ipv6_addresses: []
# IPv6 extra — ALWAYS appended
common_netplan_ipv6_extra: []
# IPv6 gateway — if empty, keep current default gateway
common_netplan_ipv6_gateway: ""
common_netplan_ipv6_on_link: true

# Nameservers — default to DNS hardening lists
common_netplan_nameservers_v4: "{{ common_resolved_dns_servers }}"
common_netplan_nameservers_v6: "{{ common_resolved_dns_servers_v6 }}"

# Rollback / connectivity test
common_netplan_rollback_timeout: 120
common_netplan_settle_seconds: 15
common_netplan_test_ipv4_target: "1.1.1.1"
common_netplan_test_ipv6_target: "2001:4860:4860::8888"
common_netplan_test_ipv6: true
common_netplan_test_https: true

# Locale
common_locale: "de_DE.UTF-8"
common_locale_configure: true

# DNS resolver hardening
common_resolved_configure: true
common_resolved_multicast_dns: "no"
common_resolved_dns_stub_listener: "no"
common_resolved_dns_servers:
  - 1.1.1.1
  - 1.0.0.1
  - 8.8.8.8
  - 8.8.4.4
common_resolved_dns_servers_v6:
  - 2606:4700:4700::1111
  - 2606:4700:4700::1001
  - 2001:4860:4860::8888
  - 2001:4860:4860::8844
common_resolved_fallback_dns:
  - 9.9.9.9
  - 149.112.112.112

# fail2ban
common_fail2ban_enabled: true
common_fail2ban_sshd_bantime: 86400
common_fail2ban_sshd_findtime: 900
common_fail2ban_sshd_maxretry: 5

# Open file limits (important for Docker, databases, etc.)
common_nofile_limit_configure: true
common_nofile_limit: 1048576

# NTP tuning
common_ntp_root_distance_max_sec: 3
common_ntp_poll_interval_min_sec: 32
common_ntp_poll_interval_max_sec: 2048
common_ntp_connection_retry_sec: 30
common_ntp_save_interval_sec: 60

# Mail relay (msmtp) - used by smartd, fail2ban, cron etc.
common_msmtp_enabled: true
common_msmtp_host: "mx1.simply-send.com"
common_msmtp_port: 465
common_msmtp_tls_starttls: "off"
common_msmtp_user: "no-reply@simply-send.com"
common_msmtp_from: "no-reply@simply-send.com"
# Password MUST be set via Ansible Vault:
#   common_msmtp_password: "{{ vault_msmtp_password }}"
common_msmtp_password: ""

# SSH hardening (disabled by default - enable per host only!)
# Will REFUSE to harden if no SSH keys are deployed for the target user.
common_ssh_hardening: false
common_ssh_permit_root_login: "prohibit-password"
common_ssh_password_authentication: "no"
common_ssh_authorized_keys_user: "root"

# SSH key sources (combined: GitHub + Vault)
# GitHub: list of GitHub usernames - keys fetched from github.com/<user>.keys
common_ssh_github_users: []
# Vault: list of additional public keys (use ansible-vault for encryption)
common_ssh_extra_keys: []
# Example:
#   common_ssh_github_users: ["karl-bauer", "ops-team-member"]
#   common_ssh_extra_keys: ["{{ vault_ssh_key_deploy_bot }}"]
