---
# Debian/Ubuntu specific variables
common_packages:
  - curl
  - wget
  - git
  - htop
  - vim
  - unzip
  - ca-certificates
  - gnupg
  - python3
  - python3-pip
  - cron
  - psmisc
  - locales  # required by locale_gen; missing on minimal Debian installs
  - tzdata  # timezone database — missing on minimal Ubuntu 22.04 containers
  # Diagnostic / operator convenience tools
  - ethtool
  - iputils-ping
  - net-tools
  - mc
  - p7zip-full
  - nano
  - apache2-utils
  - telnet
  - jq

# Ubuntu-only packages (PPA support, etc.)
common_packages_ubuntu:
  - software-properties-common
  - apt-transport-https
  - lsb-release

# VM guest tools — installed only when host is a virtualization guest
common_packages_vm_guest:
  - open-vm-tools

# Physical-host tools — installed only on bare metal
# dmidecode reads DMI/SMBIOS from the mainboard; on VMs it only returns the
# hypervisor stub, so it's not installed there.
common_packages_physical:
  - dmidecode

common_ntp_package: "systemd-timesyncd"
common_ntp_service: "systemd-timesyncd"

# Chrony path conventions — used only when common_ntp_package == "chrony"
# (e.g. Ubuntu 26.04 via vars/Ubuntu-26.yml). Debian/Ubuntu ships chrony
# with configs under /etc/chrony/ and drift in /var/lib/chrony/chrony.drift.
common_chrony_conf_path: /etc/chrony/chrony.conf
common_chrony_confdir: /etc/chrony/conf.d
common_chrony_sourcedir: /etc/chrony/sources.d
common_chrony_driftfile: /var/lib/chrony/chrony.drift
