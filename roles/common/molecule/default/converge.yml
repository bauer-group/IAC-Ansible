---
- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Disable features that need real hardware, network, or privileged
    # mount access — /etc/hosts is bind-mounted in the test container
    # so the hostname module cannot replace it atomically.
    common_hostname_configure: false
    common_netplan_configure: false
    common_firewall_ufw_state: "unmanaged"
    common_apparmor_state: "unmanaged"
    common_ssh_hardening: false
    common_msmtp_password: ""
    # NTP services (timesyncd/chrony) can't maintain state reliably
    # in Docker containers — they exit fast (no clock permissions) and
    # break idempotency. Real hosts are unaffected.
    common_ntp_configure: false

  roles:
    - role: common
