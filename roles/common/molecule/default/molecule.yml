---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/../../requirements.yml

driver:
  name: docker

platforms:
  - name: molecule-common-ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  - name: molecule-common-ubuntu2604
    image: geerlingguy/docker-ubuntu2604-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  - name: molecule-common-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp

provisioner:
  name: ansible
  env:
    # Let ansible find sibling roles by short name (repo layout: roles/<name>/).
    # MOLECULE_PROJECT_DIRECTORY resolves to the role dir (roles/<name>/),
    # so "/.." points at roles/ — the parent that Ansible scans for short names.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
    # Custom Jinja2 filters (asset_id, role_code, etc.) live at repo-root's
    # filter_plugins/. "/../.." from MOLECULE_PROJECT_DIRECTORY = repo root.
    ANSIBLE_FILTER_PLUGINS: "${MOLECULE_PROJECT_DIRECTORY}/../../filter_plugins"
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible
