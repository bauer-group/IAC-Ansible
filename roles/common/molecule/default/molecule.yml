---
dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/../../requirements.yml

driver:
  name: docker

platforms:
  - name: molecule-common-ubuntu2204
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  - name: molecule-common-ubuntu2404
    image: geerlingguy/docker-ubuntu2404-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  - name: molecule-common-ubuntu2604
    image: geerlingguy/docker-ubuntu2604-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  - name: molecule-common-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    command: /usr/lib/systemd/systemd
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    tmpfs:
      - /run
      - /tmp
  # NOTE: Rocky 9/10 platforms temporarily excluded.
  # The geerlingguy/docker-rockylinux*-ansible images become UNREACHABLE
  # immediately after container start in the self-hosted DinD runner
  # (Ansible reports 'Failed to create temporary directory' before any
  # task can run). Debian/Ubuntu platforms are unaffected. Re-add the
  # rocky blocks once the docker-exec / container init issue is debugged.

provisioner:
  name: ansible
  env:
    # Let ansible find sibling roles by short name (repo layout: roles/<name>/).
    # MOLECULE_PROJECT_DIRECTORY resolves to the role dir (roles/<name>/),
    # so "/.." points at roles/ — the parent that Ansible scans for short names.
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."
    # Custom Jinja2 filters (asset_id, role_code, etc.) live at repo-root's
    # filter_plugins/. "/../.." from MOLECULE_PROJECT_DIRECTORY = repo root.
    ANSIBLE_FILTER_PLUGINS: "${MOLECULE_PROJECT_DIRECTORY}/../../filter_plugins"
  inventory:
    group_vars:
      all:
        # Containers run as root by default; use "su" for root-to-root
        # escalation (no prompt). Sudo-based escalation fails PAM checks
        # on minimal RHEL-family images (pam_faillock not initialised).
        ansible_become_method: su
  playbooks:
    converge: converge.yml
    verify: verify.yml

verifier:
  name: ansible
