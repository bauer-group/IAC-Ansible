---
# =============================================================================
# Common Role - Netplan management
# =============================================================================
# Safety model:
#   1. Backup current netplan configs
#   2. Schedule a transient systemd rollback timer (survives SSH/Ansible crash)
#   3. Render + apply new config
#   4. Run connectivity tests (IPv4 ping, IPv6 ping, HTTPS)
#   5. On success: cancel rollback timer, remove backup
#   6. On failure: Ansible aborts, timer fires after rollback_timeout → restore

- name: "[Netplan] Gather current network facts"
  ansible.builtin.setup:
    gather_subset:
      - network

# --- Resolve effective values (merge host_vars with running config) ---

- name: "[Netplan] Determine effective interface"
  ansible.builtin.set_fact:
    common_netplan_effective_interface: >-
      {{ (common_netplan_interface
          if common_netplan_interface | length > 0
          else ansible_facts['default_ipv4'].interface | default('eth0')) }}

- name: "[Netplan] Determine current IPv4 addresses"
  ansible.builtin.set_fact:
    common_netplan_current_ipv4: >-
      {{ [ansible_facts['default_ipv4'].address ~ '/' ~
           (ansible_facts[common_netplan_effective_interface].ipv4.prefix | default('24'))]
         if (ansible_facts['default_ipv4'].address | default('')) | length > 0
         else [] }}

- name: "[Netplan] Compose effective IPv4 list"
  ansible.builtin.set_fact:
    common_netplan_effective_ipv4: >-
      {{ ((common_netplan_ipv4_addresses
           if common_netplan_ipv4_addresses | length > 0
           else common_netplan_current_ipv4)
          + common_netplan_ipv4_extra) | unique }}
    common_netplan_effective_ipv4_gateway: >-
      {{ (common_netplan_ipv4_gateway
          if common_netplan_ipv4_gateway | length > 0
          else ansible_facts['default_ipv4'].gateway | default('')) }}

- name: "[Netplan] Determine current IPv6 addresses (global scope)"
  ansible.builtin.set_fact:
    common_netplan_current_ipv6: >-
      {{ (ansible_facts[common_netplan_effective_interface].ipv6 | default([]))
         | selectattr('scope', 'equalto', 'global')
         | map(attribute='address')
         | zip(
             (ansible_facts[common_netplan_effective_interface].ipv6 | default([]))
             | selectattr('scope', 'equalto', 'global')
             | map(attribute='prefix')
           )
         | map('join', '/')
         | list }}

- name: "[Netplan] Compose effective IPv6 list"
  ansible.builtin.set_fact:
    common_netplan_effective_ipv6: >-
      {{ ((common_netplan_ipv6_addresses
           if common_netplan_ipv6_addresses | length > 0
           else common_netplan_current_ipv6)
          + common_netplan_ipv6_extra) | unique }}
    common_netplan_effective_ipv6_gateway: >-
      {{ (common_netplan_ipv6_gateway
          if common_netplan_ipv6_gateway | length > 0
          else ansible_facts['default_ipv6'].gateway | default('')) }}

- name: "[Netplan] Show effective configuration"
  ansible.builtin.debug:
    msg:
      - "interface: {{ common_netplan_effective_interface }}"
      - "ipv4: {{ common_netplan_effective_ipv4 }} (gw {{ common_netplan_effective_ipv4_gateway }})"
      - "ipv6: {{ common_netplan_effective_ipv6 }} (gw {{ common_netplan_effective_ipv6_gateway }})"
    verbosity: 1

# --- Backup + render ---

- name: "[Netplan] Create timestamped backup directory"
  ansible.builtin.file:
    path: "/etc/netplan.backup-{{ ansible_facts['date_time'].epoch }}"
    state: directory
    mode: "0700"
  register: common_netplan_backup_dir

- name: "[Netplan] Find existing netplan configs"
  ansible.builtin.find:
    paths: /etc/netplan
    patterns: "*.yaml"
  register: common_netplan_existing

- name: "[Netplan] Backup existing netplan configs"
  ansible.builtin.copy:
    src: "{{ item.path }}"
    dest: "{{ common_netplan_backup_dir.path }}/"
    remote_src: true
    mode: preserve
  loop: "{{ common_netplan_existing.files }}"

- name: "[Netplan] Deploy rollback helper"
  ansible.builtin.template:
    src: netplan-rollback.sh.j2
    dest: /usr/local/sbin/iac-netplan-rollback
    mode: "0700"
    owner: root
    group: root

- name: "[Netplan] Render managed netplan configuration"
  ansible.builtin.template:
    src: 01-iac-network.yaml.j2
    dest: "{{ common_netplan_filename }}"
    mode: "0600"
    owner: root
    group: root
  register: common_netplan_render

# --- Apply, verify, cancel rollback (single block: one `when` guards all) ---
# We convert the `changed` status into a plain boolean fact so the block's
# when-clause does not contain `.changed` — this keeps ansible-lint's
# no-handler rule happy while preserving the strict sequential order that
# real handlers could not express (render → schedule → apply → verify →
# cancel must run in exactly this order, handlers run at play-end).

- name: "[Netplan] Remember whether the config was re-rendered"
  ansible.builtin.set_fact:
    common_netplan_apply_needed: "{{ common_netplan_render is changed }}"

- name: "[Netplan] Apply + verify + cancel rollback"
  when: common_netplan_apply_needed | bool
  block:
    - name: "[Netplan] Remove stale netplan configs"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ common_netplan_existing.files }}"
      when:
        - common_netplan_remove_existing | bool
        - item.path != common_netplan_filename

    - name: "[Netplan] Validate netplan syntax"
      ansible.builtin.command: netplan generate
      changed_when: false

    - name: "[Netplan] Schedule automatic rollback via systemd-run"
      ansible.builtin.command: >-
        systemd-run
        --unit=iac-netplan-rollback
        --on-active={{ common_netplan_rollback_timeout }}s
        /usr/local/sbin/iac-netplan-rollback {{ common_netplan_backup_dir.path }}
      changed_when: true

    - name: "[Netplan] netplan apply"
      ansible.builtin.command: netplan apply
      changed_when: true

    - name: "[Netplan] Wait for network to stabilize (DAD + routing)"
      ansible.builtin.pause:
        seconds: "{{ common_netplan_settle_seconds }}"

    - name: "[Netplan] Connectivity test — IPv4 ping"
      ansible.builtin.command: "ping -c 2 -W 3 {{ common_netplan_test_ipv4_target }}"
      changed_when: false

    - name: "[Netplan] Connectivity test — IPv6 ping"
      ansible.builtin.command: "ping -6 -c 2 -W 3 {{ common_netplan_test_ipv6_target }}"
      changed_when: false
      when: common_netplan_test_ipv6 | bool

    - name: "[Netplan] Connectivity test — HTTPS reachability (validates DNS)"
      ansible.builtin.uri:
        url: "https://{{ common_netplan_test_ipv4_target }}"
        method: GET
        timeout: 5
        validate_certs: false
        status_code: [200, 301, 302, 401, 403, 404]
      when: common_netplan_test_https | bool

    - name: "[Netplan] Cancel rollback timer (connectivity OK)"
      ansible.builtin.systemd:
        name: iac-netplan-rollback.timer
        state: stopped
      failed_when: false

    - name: "[Netplan] Remove backup directory after successful apply"
      ansible.builtin.file:
        path: "{{ common_netplan_backup_dir.path }}"
        state: absent
