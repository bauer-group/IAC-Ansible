---
# =============================================================================
# Common Role - RedHat/CentOS Tasks
# =============================================================================

- name: "[RedHat] Install common packages"
  ansible.builtin.dnf:
    name: "{{ common_packages }}"
    state: present
    # RHEL 9/10 ship curl-minimal by default; installing curl would conflict
    # on the "Provides: curl" virtual capability. allowerasing lets dnf
    # replace curl-minimal with the full curl package cleanly.
    allowerasing: true
  when: common_packages_install | bool

- name: "[RedHat] Ensure crond service is running"
  ansible.builtin.systemd:
    name: crond
    state: started
    enabled: true
