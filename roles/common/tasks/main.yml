---
# =============================================================================
# Common Role - Main Tasks
# =============================================================================
# Platform detection and delegation to OS-specific tasks

- name: Gather OS family variables
  ansible.builtin.include_vars: "{{ ansible_facts['os_family'] }}.yml"

- name: Gather distribution-major-version-specific variables (optional)
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
    - files:
        - "{{ ansible_facts['distribution'] }}-{{ ansible_facts['distribution_major_version'] }}.yml"
      skip: true

- name: Display detected platform
  ansible.builtin.debug:
    msg: >
      Host: {{ inventory_hostname }}
      | OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
      | Family: {{ ansible_facts['os_family'] }}
      | Architecture: {{ ansible_facts['architecture'] }}
    verbosity: 1

- name: Include Debian/Ubuntu tasks
  ansible.builtin.include_tasks: debian.yml
  when: ansible_facts['os_family'] == "Debian"

- name: Include RedHat/CentOS tasks
  ansible.builtin.include_tasks: redhat.yml
  when: ansible_facts['os_family'] == "RedHat"

- name: Fail on unsupported platform
  ansible.builtin.fail:
    msg: "Unsupported OS family: {{ ansible_facts['os_family'] }}. Supported: Debian, RedHat"
  when: ansible_facts['os_family'] not in ["Debian", "RedHat"]

# --- Hostname ---
- name: Manage system hostname
  ansible.builtin.include_tasks: hostname.yml
  when: common_hostname_configure | bool

# --- AppArmor (Debian/Ubuntu only) ---
- name: Manage AppArmor state
  ansible.builtin.include_tasks: apparmor.yml
  when:
    - ansible_os_family == "Debian"
    - common_apparmor_state != "unmanaged"

# --- UFW firewall (Debian/Ubuntu only, opt-in) ---
- name: Manage UFW firewall state
  ansible.builtin.include_tasks: firewall.yml
  when:
    - ansible_os_family == "Debian"
    - common_firewall_ufw_state != "unmanaged"

# --- Common tasks (all platforms) ---

# --- Locale ---
- name: Generate locale
  community.general.locale_gen:
    name: "{{ common_locale }}"
    state: present
  when:
    - common_locale_configure | bool
    - ansible_os_family == "Debian"

- name: Set default locale
  ansible.builtin.copy:
    content: "LANG={{ common_locale }}\n"
    dest: /etc/default/locale
    mode: "0644"
  when: common_locale_configure | bool

# --- Timezone ---
- name: Set timezone
  community.general.timezone:
    name: "{{ common_system_timezone }}"
  when: common_timezone_configure | bool

- name: Gather service facts for NTP detection
  ansible.builtin.service_facts:
  when: common_ntp_configure | bool and common_ntp_enabled | bool

- name: Set NTP already active fact
  ansible.builtin.set_fact:
    # Retrofit-safety: skip deploy if a foreign NTP daemon is running.
    # When we manage chrony ourselves (common_ntp_package == 'chrony'),
    # running chrony is EXPECTED and must not skip our config — so it is
    # excluded from the check in that case.
    common_ntp_already_active: >-
      {{
        (
          common_ntp_package != 'chrony' and (
            (ansible_facts.services['chronyd.service'] | default({})).get('state') == 'running' or
            (ansible_facts.services['chrony.service'] | default({})).get('state') == 'running'
          )
        ) or
        (ansible_facts.services['ntpd.service'] | default({})).get('state') == 'running' or
        (ansible_facts.services['ntp.service'] | default({})).get('state') == 'running'
      }}
  when: common_ntp_configure | bool and common_ntp_enabled | bool

- name: Install NTP daemon package
  ansible.builtin.package:
    name: "{{ common_ntp_package }}"
    state: present
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - not (common_ntp_already_active | default(false) | bool)

- name: Stop and mask systemd-timesyncd when chrony is the managed daemon
  ansible.builtin.systemd:
    name: systemd-timesyncd
    state: stopped
    enabled: false
    masked: true
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - common_ntp_package == "chrony"
  failed_when: false

- name: Ensure chrony drop-in directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop: "{{ [common_chrony_confdir, common_chrony_sourcedir] | unique }}"
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - common_ntp_package == "chrony"
    - not (common_ntp_already_active | default(false) | bool)

- name: Deploy chrony main configuration (structural)
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: "{{ common_chrony_conf_path }}"
    mode: "0644"
  notify: Restart chrony
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - common_ntp_package == "chrony"
    - not (common_ntp_already_active | default(false) | bool)

- name: Deploy chrony custom NTP sources (drop-in)
  ansible.builtin.template:
    src: chrony-sources.j2
    dest: "{{ common_chrony_sourcedir }}/99-iac.sources"
    mode: "0644"
  notify: Restart chrony
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - common_ntp_servers is defined
    - common_ntp_package == "chrony"
    - not (common_ntp_already_active | default(false) | bool)

- name: Deploy chrony tuning overrides (drop-in)
  ansible.builtin.template:
    src: chrony-tuning.j2
    dest: "{{ common_chrony_confdir }}/99-iac.conf"
    mode: "0644"
  notify: Restart chrony
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - common_ntp_package == "chrony"
    - not (common_ntp_already_active | default(false) | bool)

- name: Ensure timesyncd drop-in directory exists
  ansible.builtin.file:
    path: /etc/systemd/timesyncd.conf.d
    state: directory
    mode: "0755"
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - common_ntp_package == "systemd-timesyncd"
    - not (common_ntp_already_active | default(false) | bool)

- name: Deploy timesyncd configuration (drop-in)
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf.d/99-iac.conf
    mode: "0644"
  notify: Restart timesyncd
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - common_ntp_servers is defined
    - common_ntp_package == "systemd-timesyncd"
    - not (common_ntp_already_active | default(false) | bool)

- name: Enable and start NTP service
  ansible.builtin.systemd:
    name: "{{ common_ntp_service }}"
    state: started
    enabled: true
  when:
    - common_ntp_configure | bool
    - common_ntp_enabled | bool
    - not (common_ntp_already_active | default(false) | bool)

# --- Mail relay (msmtp) ---
- name: Install msmtp
  ansible.builtin.package:
    name:
      - msmtp
      - msmtp-mta
    state: present
  when:
    - common_msmtp_enabled | bool
    - common_msmtp_password | length > 0

- name: Deploy msmtp configuration
  ansible.builtin.template:
    src: msmtprc.j2
    dest: /etc/msmtprc
    mode: "0600"
    owner: root
    group: root
  when:
    - common_msmtp_enabled | bool
    - common_msmtp_password | length > 0

# --- DNS resolver hardening ---
# Only on hosts that actually run systemd-resolved — minimal containers
# (CI test images) often ship without it; deploying resolved.conf there
# would trigger a handler for a non-existent service.
- name: Gather service facts for resolved-presence check
  ansible.builtin.service_facts:
  when: common_resolved_configure | bool

- name: Deploy resolved.conf (disable mDNS + stub listener)
  ansible.builtin.template:
    src: resolved.conf.j2
    dest: /etc/systemd/resolved.conf
    mode: "0644"
  notify: Restart resolved
  when:
    - common_resolved_configure | bool
    - "'systemd-resolved.service' in (ansible_facts.services | default({}))"

# --- fail2ban ---
- name: Install fail2ban
  ansible.builtin.package:
    name: fail2ban
    state: present
  when: common_fail2ban_enabled | bool

- name: Deploy fail2ban SSH jail configuration
  ansible.builtin.template:
    src: jail-sshd.conf.j2
    dest: /etc/fail2ban/jail.d/01-sshd.conf
    mode: "0644"
  notify: Restart fail2ban
  when: common_fail2ban_enabled | bool

- name: Deploy fail2ban recidive jail configuration
  ansible.builtin.template:
    src: jail-recidive.conf.j2
    dest: /etc/fail2ban/jail.d/99-recidive.conf
    mode: "0644"
  notify: Restart fail2ban
  when:
    - common_fail2ban_enabled | bool
    - common_fail2ban_recidive_enabled | bool

- name: Remove fail2ban recidive jail when disabled
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d/99-recidive.conf
    state: absent
  notify: Restart fail2ban
  when:
    - common_fail2ban_enabled | bool
    - not (common_fail2ban_recidive_enabled | bool)

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  when: common_fail2ban_enabled | bool

# --- Open file limits ---
- name: Create systemd system.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/system.conf.d
    state: directory
    mode: "0755"
  when: common_nofile_limit_configure | bool

- name: Create systemd user.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/user.conf.d
    state: directory
    mode: "0755"
  when: common_nofile_limit_configure | bool

- name: Deploy system-wide nofile limit
  ansible.builtin.template:
    src: systemd-nofile.conf.j2
    dest: /etc/systemd/system.conf.d/01-nofile.conf
    mode: "0644"
  when: common_nofile_limit_configure | bool

- name: Deploy user-wide nofile limit
  ansible.builtin.template:
    src: systemd-nofile.conf.j2
    dest: /etc/systemd/user.conf.d/01-nofile.conf
    mode: "0644"
  when: common_nofile_limit_configure | bool

- name: Set ulimit in root profile
  ansible.builtin.lineinfile:
    path: /root/.profile
    line: "ulimit -n {{ common_nofile_limit }}"
    regexp: "^ulimit -n"
    state: present
    create: true
    mode: "0644"
  when: common_nofile_limit_configure | bool

# --- Logging ---
- name: Create Ansible log directory
  ansible.builtin.file:
    path: /var/log/ansible
    state: directory
    mode: "0755"
  when: common_logdir_configure | bool

- name: Clear static MOTD (replaced by dynamic)
  ansible.builtin.copy:
    content: ""
    dest: /etc/motd
    mode: "0644"
  when: common_motd_configure | bool and common_motd_enabled | bool

- name: Ensure update-motd.d directory exists (Debian)
  ansible.builtin.file:
    path: /etc/update-motd.d
    state: directory
    mode: "0755"
  when:
    - common_motd_configure | bool and common_motd_enabled | bool
    - ansible_os_family == "Debian"

- name: Remove default Debian MOTD scripts
  ansible.builtin.shell: |
    find /etc/update-motd.d -maxdepth 1 -type f ! -name '50-iac-ansible' -exec chmod -x {} \;
  changed_when: false
  when:
    - common_motd_configure | bool and common_motd_enabled | bool
    - ansible_os_family == "Debian"

- name: Deploy dynamic MOTD script (Debian)
  ansible.builtin.template:
    src: motd-dynamic.sh.j2
    dest: /etc/update-motd.d/50-iac-ansible
    mode: "0755"
  when:
    - common_motd_configure | bool and common_motd_enabled | bool
    - ansible_os_family == "Debian"

- name: Deploy dynamic MOTD script (RedHat)
  ansible.builtin.template:
    src: motd-dynamic.sh.j2
    dest: /etc/profile.d/iac-motd.sh
    mode: "0755"
  when:
    - common_motd_configure | bool and common_motd_enabled | bool
    - ansible_os_family == "RedHat"

- name: Include SSH hardening
  ansible.builtin.include_tasks: ssh_hardening.yml
  when: common_ssh_hardening | bool

# --- Netplan (Debian/Ubuntu only, opt-in) ---
- name: Manage Netplan configuration
  ansible.builtin.include_tasks: netplan.yml
  when:
    - common_netplan_configure | bool
    - ansible_os_family == "Debian"
