---
# =============================================================================
# Common Role - Main Tasks
# =============================================================================
# Platform detection and delegation to OS-specific tasks

- name: Gather OS family variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Display detected platform
  ansible.builtin.debug:
    msg: >
      Host: {{ inventory_hostname }}
      | OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
      | Family: {{ ansible_os_family }}
      | Architecture: {{ ansible_architecture }}

- name: Include Debian/Ubuntu tasks
  ansible.builtin.include_tasks: debian.yml
  when: ansible_os_family == "Debian"

- name: Include RedHat/CentOS tasks
  ansible.builtin.include_tasks: redhat.yml
  when: ansible_os_family == "RedHat"

- name: Fail on unsupported platform
  ansible.builtin.fail:
    msg: "Unsupported OS family: {{ ansible_os_family }}. Supported: Debian, RedHat"
  when: ansible_os_family not in ["Debian", "RedHat"]

# --- Common tasks (all platforms) ---

# --- Locale ---
- name: Generate locale
  community.general.locale_gen:
    name: "{{ common_locale }}"
    state: present
  when:
    - common_locale_configure | bool
    - ansible_os_family == "Debian"

- name: Set default locale
  ansible.builtin.copy:
    content: "LANG={{ common_locale }}\n"
    dest: /etc/default/locale
    mode: "0644"
  when: common_locale_configure | bool

# --- Timezone ---
- name: Set timezone
  community.general.timezone:
    name: "{{ system_timezone }}"
  when: common_timezone_configure | bool

- name: Gather service facts for NTP detection
  ansible.builtin.service_facts:
  when: common_ntp_configure | bool and ntp_enabled | bool

- name: Set NTP already active fact
  ansible.builtin.set_fact:
    common_ntp_already_active: >-
      {{
        (ansible_facts.services['chronyd.service'] | default({})).get('state') == 'running' or
        (ansible_facts.services['chrony.service'] | default({})).get('state') == 'running' or
        (ansible_facts.services['ntpd.service'] | default({})).get('state') == 'running' or
        (ansible_facts.services['ntp.service'] | default({})).get('state') == 'running'
      }}
  when: common_ntp_configure | bool and ntp_enabled | bool

- name: Deploy timesyncd configuration
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    mode: "0644"
  notify: Restart timesyncd
  when:
    - common_ntp_configure | bool
    - ntp_enabled | bool
    - ntp_servers is defined
    - not (common_ntp_already_active | default(false) | bool)

- name: Enable and start NTP service
  ansible.builtin.systemd:
    name: "{{ common_ntp_service }}"
    state: started
    enabled: true
  when:
    - common_ntp_configure | bool
    - ntp_enabled | bool
    - not (common_ntp_already_active | default(false) | bool)

# --- DNS resolver hardening ---
- name: Deploy resolved.conf (disable mDNS + stub listener)
  ansible.builtin.template:
    src: resolved.conf.j2
    dest: /etc/systemd/resolved.conf
    mode: "0644"
  notify: Restart resolved
  when: common_resolved_configure | bool

# --- fail2ban ---
- name: Install fail2ban
  ansible.builtin.package:
    name: fail2ban
    state: present
  when: common_fail2ban_enabled | bool

- name: Deploy fail2ban SSH jail configuration
  ansible.builtin.template:
    src: jail-sshd.conf.j2
    dest: /etc/fail2ban/jail.d/01-sshd.conf
    mode: "0644"
  notify: Restart fail2ban
  when: common_fail2ban_enabled | bool

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  when: common_fail2ban_enabled | bool

# --- Open file limits ---
- name: Create systemd system.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/system.conf.d
    state: directory
    mode: "0755"
  when: common_nofile_limit_configure | bool

- name: Create systemd user.conf.d directory
  ansible.builtin.file:
    path: /etc/systemd/user.conf.d
    state: directory
    mode: "0755"
  when: common_nofile_limit_configure | bool

- name: Deploy system-wide nofile limit
  ansible.builtin.template:
    src: systemd-nofile.conf.j2
    dest: /etc/systemd/system.conf.d/01-nofile.conf
    mode: "0644"
  when: common_nofile_limit_configure | bool

- name: Deploy user-wide nofile limit
  ansible.builtin.template:
    src: systemd-nofile.conf.j2
    dest: /etc/systemd/user.conf.d/01-nofile.conf
    mode: "0644"
  when: common_nofile_limit_configure | bool

- name: Set ulimit in root profile
  ansible.builtin.lineinfile:
    path: /root/.profile
    line: "ulimit -n {{ common_nofile_limit }}"
    regexp: "^ulimit -n"
    state: present
    create: true
    mode: "0644"
  when: common_nofile_limit_configure | bool

# --- Logging ---
- name: Create Ansible log directory
  ansible.builtin.file:
    path: /var/log/ansible
    state: directory
    mode: "0755"
  when: common_logdir_configure | bool

- name: Clear static MOTD (replaced by dynamic)
  ansible.builtin.copy:
    content: ""
    dest: /etc/motd
    mode: "0644"
  when: common_motd_configure | bool and motd_enabled | bool

- name: Ensure update-motd.d directory exists (Debian)
  ansible.builtin.file:
    path: /etc/update-motd.d
    state: directory
    mode: "0755"
  when:
    - common_motd_configure | bool and motd_enabled | bool
    - ansible_os_family == "Debian"

- name: Remove default Debian MOTD scripts
  ansible.builtin.shell: |
    find /etc/update-motd.d -maxdepth 1 -type f ! -name '50-iac-ansible' -exec chmod -x {} \;
  changed_when: false
  when:
    - common_motd_configure | bool and motd_enabled | bool
    - ansible_os_family == "Debian"

- name: Deploy dynamic MOTD script (Debian)
  ansible.builtin.template:
    src: motd-dynamic.sh.j2
    dest: /etc/update-motd.d/50-iac-ansible
    mode: "0755"
  when:
    - common_motd_configure | bool and motd_enabled | bool
    - ansible_os_family == "Debian"

- name: Deploy dynamic MOTD script (RedHat)
  ansible.builtin.template:
    src: motd-dynamic.sh.j2
    dest: /etc/profile.d/iac-motd.sh
    mode: "0755"
  when:
    - common_motd_configure | bool and motd_enabled | bool
    - ansible_os_family == "RedHat"

- name: Include SSH hardening
  ansible.builtin.include_tasks: ssh_hardening.yml
  when: common_ssh_hardening | bool
