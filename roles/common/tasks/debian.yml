---
# =============================================================================
# Common Role - Debian/Ubuntu Tasks
# =============================================================================

- name: "[Debian] Update apt cache (once per day)"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 86400

- name: "[Debian] Install common packages"
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  when: common_packages_install | bool

- name: "[Ubuntu] Install Ubuntu-specific packages"
  ansible.builtin.apt:
    name: "{{ common_packages_ubuntu }}"
    state: present
  when:
    - common_packages_install | bool
    - ansible_distribution == "Ubuntu"

- name: "[Debian] Install VM guest packages (open-vm-tools)"
  ansible.builtin.apt:
    name: "{{ common_packages_vm_guest }}"
    state: present
  when:
    - common_packages_install | bool
    - common_install_vm_tools | bool

- name: "[Debian] Install physical-host packages (dmidecode)"
  ansible.builtin.apt:
    name: "{{ common_packages_physical }}"
    state: present
  when:
    - common_packages_install | bool
    - common_install_physical_tools | bool

- name: "[Debian] Ensure cron service is running"
  ansible.builtin.systemd:
    name: cron
    state: started
    enabled: true
