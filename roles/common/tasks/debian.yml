---
# =============================================================================
# Common Role - Debian/Ubuntu Tasks
# =============================================================================

# Self-heal hosts bootstrapped with legacy `apt-add-repository ppa:ansible/ansible`.
# That command writes a deb822 .sources file with an INLINE Signed-By PGP key,
# which conflicts with the signed-by keyring pattern used by install.sh and
# roles/ansible_pull. Must run before ANY apt module, otherwise apt aborts with
# "Conflicting values set for option Signed-By" and breaks the entire play.
- name: "[Ubuntu] Find legacy add-apt-repository Ansible PPA files"
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "ansible-ubuntu-ansible-*.sources"
    file_type: file
  register: common_legacy_ansible_ppa
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    - ansible_facts['distribution_major_version'] in ["22", "24"]

- name: "[Ubuntu] Remove legacy add-apt-repository Ansible PPA files"
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ common_legacy_ansible_ppa.files | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when:
    - common_legacy_ansible_ppa.files is defined
    - common_legacy_ansible_ppa.files | length > 0

- name: "[Debian] Update apt cache (once per hour)"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "[Debian] Install common packages"
  ansible.builtin.apt:
    name: "{{ common_packages }}"
    state: present
  when: common_packages_install | bool

- name: "[Ubuntu] Install Ubuntu-specific packages"
  ansible.builtin.apt:
    name: "{{ common_packages_ubuntu }}"
    state: present
  when:
    - common_packages_install | bool
    - ansible_facts['distribution'] == "Ubuntu"

- name: "[Debian] Install VM guest packages (open-vm-tools)"
  ansible.builtin.apt:
    name: "{{ common_packages_vm_guest }}"
    state: present
  when:
    - common_packages_install | bool
    - common_install_vm_tools | bool

- name: "[Debian] Install physical-host packages (dmidecode)"
  ansible.builtin.apt:
    name: "{{ common_packages_physical }}"
    state: present
  when:
    - common_packages_install | bool
    - common_install_physical_tools | bool

- name: "[Debian] Ensure cron service is running"
  ansible.builtin.systemd:
    name: cron
    state: started
    enabled: true
