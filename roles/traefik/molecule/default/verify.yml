---
- name: Verify
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Verify role executed without errors
      ansible.builtin.debug:
        msg: >-
          Traefik role converged successfully.
          Actual installation is disabled in molecule (requires Docker + network).
          Verifying idempotency and task structure only.

    - name: Verify no installer script left behind
      ansible.builtin.stat:
        path: /tmp/traefik-install.sh
      register: traefik_installer_stat
      failed_when: traefik_installer_stat.stat.exists
