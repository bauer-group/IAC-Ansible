---
- name: Verify
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Verify consumer variables are set (empty = graceful degradation)
      ansible.builtin.assert:
        that:
          - common_msmtp_password is defined
          - common_msmtp_password == ""
          - common_ssh_extra_keys is defined
          - common_ssh_extra_keys | length == 0
          - auto_update_statusmon_url is defined
          - auto_update_statusmon_url == ""
          - auto_update_statusmon_username is defined
          - auto_update_statusmon_username == ""
          - auto_update_statusmon_password is defined
          - auto_update_statusmon_password == ""
        fail_msg: "Consumer variables not properly set by secrets role"
        success_msg: "All consumer variables set to empty defaults (graceful degradation works)"

    - name: Verify secrets_backend is valid
      ansible.builtin.assert:
        that:
          - secrets_backend == "ansible-vault"
        fail_msg: "Unexpected secrets_backend value: {{ secrets_backend }}"
