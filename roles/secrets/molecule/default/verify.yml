---
- name: Verify
  hosts: all
  become: true
  gather_facts: false

  tasks:
    # Role variable assertions run in converge (post_tasks), where role
    # defaults are in scope. This play checks only externally observable
    # side effects — for the secrets role there are none when the
    # ansible-vault backend has no secrets.yml present (graceful path).
    - name: No external artifacts expected on graceful-degradation path
      ansible.builtin.debug:
        msg: "secrets role validated in converge post_tasks"
