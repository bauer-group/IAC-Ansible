---
- name: Verify
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: Verify secrets are published with empty defaults (graceful degradation)
      ansible.builtin.assert:
        that:
          - secrets_msmtp_password is defined
          - secrets_msmtp_password == ""
          - secrets_ssh_deploy_key is defined
          - secrets_ssh_deploy_key == ""
          - secrets_statusmon_url is defined
          - secrets_statusmon_url == ""
          - secrets_statusmon_username is defined
          - secrets_statusmon_username == ""
          - secrets_statusmon_password is defined
          - secrets_statusmon_password == ""
        fail_msg: "Secrets role did not publish expected secrets_* variables"
        success_msg: "All secrets_* variables published with empty defaults (graceful degradation works)"

    - name: Verify secrets_backend is valid
      ansible.builtin.assert:
        that:
          - secrets_backend == "ansible-vault"
        fail_msg: "Unexpected secrets_backend value: {{ secrets_backend }}"
