---
# =============================================================================
# Secrets Role Defaults
# =============================================================================
# Abstraction layer for secrets backends. Toggle between Ansible Vault
# (file-based) and HashiCorp Vault (API-based) with a single variable.
#
# Usage:
#   secrets_backend: "ansible-vault"     → uses group_vars/all/secrets.yml
#   secrets_backend: "hashicorp-vault"   → uses KV v2 via AppRole auth
# =============================================================================

# Backend selection (override in group_vars or host_vars)
secrets_backend: "ansible-vault"

# --- Vault variable fallbacks (graceful degradation) ---
# When no backend provides a value, these empty defaults ensure roles
# skip secret-dependent tasks (guarded by `| length > 0` checks).
vault_msmtp_password: ""
vault_ssh_key_deploy_bot: ""
vault_statusmon_url: ""
vault_statusmon_username: ""
vault_statusmon_password: ""

# --- HashiCorp Vault connection settings ---
# Only used when secrets_backend == "hashicorp-vault".
hashicorp_vault_addr: ""
hashicorp_vault_auth_method: "approle"
hashicorp_vault_role_id_file: "/etc/iac-ansible/vault-role-id"
hashicorp_vault_secret_id_file: "/etc/iac-ansible/vault-secret-id"
hashicorp_vault_secret_path: "iac-ansible/shared"
hashicorp_vault_mount_point: "secret"
hashicorp_vault_ca_cert: ""
