---
# =============================================================================
# Secrets Role Defaults
# =============================================================================
# Abstraction layer for secrets backends. Toggle between Ansible Vault
# (file-based) and HashiCorp Vault (API-based) with a single variable.
#
# Usage:
#   secrets_backend: "ansible-vault"     → uses group_vars/all/secrets.yml
#   secrets_backend: "hashicorp-vault"   → uses KV v2 via AppRole auth
# =============================================================================

# Backend selection (override in group_vars or host_vars)
secrets_backend: "ansible-vault"

# --- Published secret values (graceful degradation) ---
# When no backend provides a value, these empty defaults ensure consumer
# roles skip secret-dependent tasks (guarded by `| length > 0` checks).
# Consumer roles reference these via their own defaults:
#   common_msmtp_password: "{{ secrets_msmtp_password | default('') }}"
secrets_msmtp_password: ""
secrets_ssh_deploy_key: ""
secrets_statusmon_url: ""
secrets_statusmon_username: ""
secrets_statusmon_password: ""
secrets_portainer_admin_password: ""
secrets_portainer_license: ""

# --- HashiCorp Vault connection settings ---
# Only used when secrets_backend == "hashicorp-vault".
secrets_vault_addr: ""
secrets_vault_auth_method: "approle"
secrets_vault_role_id_file: "/etc/iac-ansible/vault-role-id"
secrets_vault_secret_id_file: "/etc/iac-ansible/vault-secret-id"
secrets_vault_secret_path: "iac-ansible/shared"
secrets_vault_mount_point: "secret"
secrets_vault_ca_cert: ""
