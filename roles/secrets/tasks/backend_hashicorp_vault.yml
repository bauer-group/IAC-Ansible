---
# =============================================================================
# HashiCorp Vault Backend
# =============================================================================
# Uses AppRole authentication + KV v2 secrets engine.
# Requires: community.hashi_vault collection + hvac Python library.
#
# Auth flow:
#   1. Read role_id + secret_id from local files (provisioned via install.sh)
#   2. Authenticate to Vault via AppRole
#   3. Fetch secrets from configured KV v2 path
#   4. Set secrets_* variables via set_fact
#   5. Clear temporary credentials from memory
#
# Team isolation:
#   Override secrets_vault_secret_path per group/host to point to
#   team-specific KV paths (e.g., "iac-ansible/team-alpha").
# =============================================================================

- name: "HashiCorp Vault | Validate connection settings"
  ansible.builtin.assert:
    that:
      - secrets_vault_addr | length > 0
      - secrets_vault_auth_method in ["approle", "token"]
    fail_msg: >-
      HashiCorp Vault backend requires secrets_vault_addr to be set.
      Current value: '{{ secrets_vault_addr }}'
    quiet: true

- name: "HashiCorp Vault | Check role_id file exists"
  ansible.builtin.stat:
    path: "{{ secrets_vault_role_id_file }}"
  register: secrets_hv_role_id_stat
  when: secrets_vault_auth_method == "approle"

- name: "HashiCorp Vault | Check secret_id file exists"
  ansible.builtin.stat:
    path: "{{ secrets_vault_secret_id_file }}"
  register: secrets_hv_secret_id_stat
  when: secrets_vault_auth_method == "approle"

- name: "HashiCorp Vault | Fail if AppRole credentials are missing"
  ansible.builtin.fail:
    msg: >-
      AppRole credential files not found.
      role_id: {{ secrets_vault_role_id_file }}
      (exists: {{ secrets_hv_role_id_stat.stat.exists | default(false) }})
      secret_id: {{ secrets_vault_secret_id_file }}
      (exists: {{ secrets_hv_secret_id_stat.stat.exists | default(false) }}).
      Deploy credentials via install.sh or manually.
  when:
    - secrets_vault_auth_method == "approle"
    - not (secrets_hv_role_id_stat.stat.exists | default(false)) or
      not (secrets_hv_secret_id_stat.stat.exists | default(false))

- name: "HashiCorp Vault | Read role_id"
  ansible.builtin.slurp:
    src: "{{ secrets_vault_role_id_file }}"
  register: secrets_hv_role_id_raw
  no_log: true
  when: secrets_vault_auth_method == "approle"

- name: "HashiCorp Vault | Read secret_id"
  ansible.builtin.slurp:
    src: "{{ secrets_vault_secret_id_file }}"
  register: secrets_hv_secret_id_raw
  no_log: true
  when: secrets_vault_auth_method == "approle"

- name: "HashiCorp Vault | Set auth credentials"
  ansible.builtin.set_fact:
    secrets_hv_role_id: "{{ secrets_hv_role_id_raw.content | b64decode | trim }}"
    secrets_hv_secret_id: "{{ secrets_hv_secret_id_raw.content | b64decode | trim }}"
  no_log: true
  when: secrets_vault_auth_method == "approle"

- name: "HashiCorp Vault | Fetch secrets from KV v2"
  ansible.builtin.set_fact:
    secrets_hv_data: >-
      {{ lookup('community.hashi_vault.vault_kv2_get',
           secrets_vault_secret_path,
           engine_mount_point=secrets_vault_mount_point,
           url=secrets_vault_addr,
           auth_method='approle',
           role_id=secrets_hv_role_id,
           secret_id=secrets_hv_secret_id,
           ca_cert=secrets_vault_ca_cert if secrets_vault_ca_cert | length > 0 else omit
         ) }}
  no_log: true

- name: "HashiCorp Vault | Publish secrets_* variables from fetched data"
  ansible.builtin.set_fact:
    secrets_msmtp_password: "{{ secrets_hv_data.secret.msmtp_password | default('') }}"
    secrets_ssh_deploy_key: "{{ secrets_hv_data.secret.ssh_deploy_key | default('') }}"
    secrets_statusmon_url: "{{ secrets_hv_data.secret.statusmon_url | default('') }}"
    secrets_statusmon_username: "{{ secrets_hv_data.secret.statusmon_username | default('') }}"
    secrets_statusmon_password: "{{ secrets_hv_data.secret.statusmon_password | default('') }}"
  no_log: true

- name: "HashiCorp Vault | Clear temporary credentials"
  ansible.builtin.set_fact:
    secrets_hv_role_id: ""
    secrets_hv_secret_id: ""
    secrets_hv_role_id_raw: {}
    secrets_hv_secret_id_raw: {}
    secrets_hv_data: {}
  no_log: true
