---
# =============================================================================
# HashiCorp Vault Backend
# =============================================================================
# Uses AppRole authentication + KV v2 secrets engine.
# Requires: community.hashi_vault collection + hvac Python library.
#
# Auth flow:
#   1. Read role_id + secret_id from local files (provisioned via install.sh)
#   2. Authenticate to Vault via AppRole
#   3. Fetch secrets from configured KV v2 path
#   4. Set vault_* variables via set_fact
#   5. Clear temporary credentials from memory
#
# Team isolation:
#   Override hashicorp_vault_secret_path per group/host to point to
#   team-specific KV paths (e.g., "iac-ansible/team-alpha").
# =============================================================================

- name: "HashiCorp Vault | Validate connection settings"
  ansible.builtin.assert:
    that:
      - hashicorp_vault_addr | length > 0
      - hashicorp_vault_auth_method in ["approle", "token"]
    fail_msg: >-
      HashiCorp Vault backend requires hashicorp_vault_addr to be set.
      Current value: '{{ hashicorp_vault_addr }}'
    quiet: true

- name: "HashiCorp Vault | Check role_id file exists"
  ansible.builtin.stat:
    path: "{{ hashicorp_vault_role_id_file }}"
  register: _hv_role_id_stat
  when: hashicorp_vault_auth_method == "approle"

- name: "HashiCorp Vault | Check secret_id file exists"
  ansible.builtin.stat:
    path: "{{ hashicorp_vault_secret_id_file }}"
  register: _hv_secret_id_stat
  when: hashicorp_vault_auth_method == "approle"

- name: "HashiCorp Vault | Fail if AppRole credentials are missing"
  ansible.builtin.fail:
    msg: >-
      AppRole credential files not found.
      role_id: {{ hashicorp_vault_role_id_file }}
      (exists: {{ _hv_role_id_stat.stat.exists | default(false) }})
      secret_id: {{ hashicorp_vault_secret_id_file }}
      (exists: {{ _hv_secret_id_stat.stat.exists | default(false) }}).
      Deploy credentials via install.sh or manually.
  when:
    - hashicorp_vault_auth_method == "approle"
    - not (_hv_role_id_stat.stat.exists | default(false)) or
      not (_hv_secret_id_stat.stat.exists | default(false))

- name: "HashiCorp Vault | Read role_id"
  ansible.builtin.slurp:
    src: "{{ hashicorp_vault_role_id_file }}"
  register: _hv_role_id_raw
  no_log: true
  when: hashicorp_vault_auth_method == "approle"

- name: "HashiCorp Vault | Read secret_id"
  ansible.builtin.slurp:
    src: "{{ hashicorp_vault_secret_id_file }}"
  register: _hv_secret_id_raw
  no_log: true
  when: hashicorp_vault_auth_method == "approle"

- name: "HashiCorp Vault | Set auth credentials"
  ansible.builtin.set_fact:
    _hv_role_id: "{{ _hv_role_id_raw.content | b64decode | trim }}"
    _hv_secret_id: "{{ _hv_secret_id_raw.content | b64decode | trim }}"
  no_log: true
  when: hashicorp_vault_auth_method == "approle"

- name: "HashiCorp Vault | Fetch secrets from KV v2"
  ansible.builtin.set_fact:
    _hv_secrets: >-
      {{ lookup('community.hashi_vault.vault_kv2_get',
           hashicorp_vault_secret_path,
           engine_mount_point=hashicorp_vault_mount_point,
           url=hashicorp_vault_addr,
           auth_method='approle',
           role_id=_hv_role_id,
           secret_id=_hv_secret_id,
           ca_cert=hashicorp_vault_ca_cert if hashicorp_vault_ca_cert | length > 0 else omit
         ) }}
  no_log: true

- name: "HashiCorp Vault | Set vault_* variables from fetched data"
  ansible.builtin.set_fact:
    vault_msmtp_password: "{{ _hv_secrets.secret.msmtp_password | default('') }}"
    vault_ssh_key_deploy_bot: "{{ _hv_secrets.secret.ssh_key_deploy_bot | default('') }}"
    vault_statusmon_url: "{{ _hv_secrets.secret.statusmon_url | default('') }}"
    vault_statusmon_username: "{{ _hv_secrets.secret.statusmon_username | default('') }}"
    vault_statusmon_password: "{{ _hv_secrets.secret.statusmon_password | default('') }}"
  no_log: true

- name: "HashiCorp Vault | Clear temporary credentials"
  ansible.builtin.set_fact:
    _hv_role_id: ""
    _hv_secret_id: ""
    _hv_role_id_raw: {}
    _hv_secret_id_raw: {}
    _hv_secrets: {}
  no_log: true
