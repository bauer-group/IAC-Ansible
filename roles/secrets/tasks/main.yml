---
# =============================================================================
# Secrets Role - Backend Dispatcher
# =============================================================================
# Resolves all secrets_* variables from the configured backend. Consumer
# roles reference these via their own defaults — no mapping layer needed.
#
# Must run BEFORE any role that depends on secrets (Phase 0 in site.yml).
# =============================================================================

- name: "Secrets | Validate backend selection"
  ansible.builtin.assert:
    that:
      - secrets_backend in ["ansible-vault", "hashicorp-vault"]
    fail_msg: >-
      Invalid secrets_backend '{{ secrets_backend }}'.
      Must be 'ansible-vault' or 'hashicorp-vault'.
    quiet: true

# Legacy-API pre-flight: v2.0.0 renamed public variables to use a
# secrets_ prefix (role ownership). If any of the old names are still
# defined in group_vars / host_vars / secrets.yml, the new code path
# would silently resolve all consumer values to empty → msmtp + SSH
# deploy keys + statusmon silently disabled. Fail loudly instead.
- name: "Secrets | Reject legacy vault_* / hashicorp_vault_* variables"
  ansible.builtin.assert:
    that:
      - vault_msmtp_password is not defined
      - vault_ssh_key_deploy_bot is not defined
      - vault_statusmon_url is not defined
      - vault_statusmon_username is not defined
      - vault_statusmon_password is not defined
      - hashicorp_vault_addr is not defined
      - hashicorp_vault_auth_method is not defined
      - hashicorp_vault_role_id_file is not defined
      - hashicorp_vault_secret_id_file is not defined
      - hashicorp_vault_secret_path is not defined
      - hashicorp_vault_mount_point is not defined
      - hashicorp_vault_ca_cert is not defined
    fail_msg: |
      BREAKING CHANGE detected: legacy vault_* / hashicorp_vault_*
      variables are still defined. The secrets role (v2.0.0+) requires
      the renamed secrets_* / secrets_vault_* keys.

      Migration — rename in group_vars/all/secrets.yml AND secrets_config.yml:
        vault_msmtp_password           -> secrets_msmtp_password
        vault_ssh_key_deploy_bot       -> secrets_ssh_deploy_key
        vault_statusmon_url            -> secrets_statusmon_url
        vault_statusmon_username       -> secrets_statusmon_username
        vault_statusmon_password       -> secrets_statusmon_password
        hashicorp_vault_addr           -> secrets_vault_addr
        hashicorp_vault_auth_method    -> secrets_vault_auth_method
        hashicorp_vault_role_id_file   -> secrets_vault_role_id_file
        hashicorp_vault_secret_id_file -> secrets_vault_secret_id_file
        hashicorp_vault_secret_path    -> secrets_vault_secret_path
        hashicorp_vault_mount_point    -> secrets_vault_mount_point
        hashicorp_vault_ca_cert        -> secrets_vault_ca_cert

      HashiCorp Vault KV-store (if used): rename key "ssh_key_deploy_bot"
      to "ssh_deploy_key" as well.

      Full migration guide: docs/vault.md
    quiet: true

- name: "Secrets | Load from Ansible Vault backend"
  ansible.builtin.include_tasks: backend_ansible_vault.yml
  when: secrets_backend == "ansible-vault"

- name: "Secrets | Load from HashiCorp Vault backend"
  ansible.builtin.include_tasks: backend_hashicorp_vault.yml
  when: secrets_backend == "hashicorp-vault"
