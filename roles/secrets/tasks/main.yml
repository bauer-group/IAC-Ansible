---
# =============================================================================
# Secrets Role - Backend Dispatcher
# =============================================================================
# Resolves all vault_* variables from the configured backend, then maps
# them to the consumer variables used by other roles.
#
# Must run BEFORE any role that depends on secrets (Phase 0 in site.yml).
# =============================================================================

- name: "Secrets | Validate backend selection"
  ansible.builtin.assert:
    that:
      - secrets_backend in ["ansible-vault", "hashicorp-vault"]
    fail_msg: >-
      Invalid secrets_backend '{{ secrets_backend }}'.
      Must be 'ansible-vault' or 'hashicorp-vault'.
    quiet: true

- name: "Secrets | Load from Ansible Vault backend"
  ansible.builtin.include_tasks: backend_ansible_vault.yml
  when: secrets_backend == "ansible-vault"

- name: "Secrets | Load from HashiCorp Vault backend"
  ansible.builtin.include_tasks: backend_hashicorp_vault.yml
  when: secrets_backend == "hashicorp-vault"

# --- Map vault_* variables to consumer variables ---
# This is the single mapping point. Roles never reference vault_* directly.
# set_fact has higher precedence than role defaults, so this cleanly
# overrides the empty defaults in consuming roles.
- name: "Secrets | Map secrets to consumer variables"
  ansible.builtin.set_fact:
    common_msmtp_password: "{{ vault_msmtp_password }}"
    common_ssh_extra_keys: "{{ [vault_ssh_key_deploy_bot] if vault_ssh_key_deploy_bot | length > 0 else [] }}"
    auto_update_statusmon_url: "{{ vault_statusmon_url }}"
    auto_update_statusmon_username: "{{ vault_statusmon_username }}"
    auto_update_statusmon_password: "{{ vault_statusmon_password }}"
  no_log: true
