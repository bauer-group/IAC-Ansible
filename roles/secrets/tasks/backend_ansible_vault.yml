---
# =============================================================================
# Ansible Vault Backend
# =============================================================================
# Expects: inventory/{env}/group_vars/all/secrets.yml (encrypted, out-of-band)
# Decrypted automatically by Ansible when vault-password is available at
# /etc/ansible/vault-password (configured in ansible.cfg).
#
# This file only validates that secrets are loaded. The actual decryption
# is handled by Ansible's group_vars mechanism — no action needed here.
# =============================================================================

- name: "Ansible Vault | Report secrets status"
  ansible.builtin.debug:
    msg: >-
      Ansible Vault backend active.
      Loaded secrets:
      secrets_msmtp_password={{ 'SET' if secrets_msmtp_password | length > 0 else 'EMPTY' }},
      secrets_ssh_deploy_key={{ 'SET' if secrets_ssh_deploy_key | length > 0 else 'EMPTY' }},
      secrets_statusmon_url={{ 'SET' if secrets_statusmon_url | length > 0 else 'EMPTY' }},
      secrets_statusmon_username={{ 'SET' if secrets_statusmon_username | length > 0 else 'EMPTY' }},
      secrets_statusmon_password={{ 'SET' if secrets_statusmon_password | length > 0 else 'EMPTY' }}
