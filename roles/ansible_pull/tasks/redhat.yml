---
# =============================================================================
# Ansible-Pull - RedHat/CentOS: Install Ansible
# =============================================================================

- name: "[RedHat] Install EPEL repository"
  ansible.builtin.dnf:
    name: epel-release
    state: present

# Use ansible-core (available on all supported EL versions via EPEL)
# instead of the full "ansible" community meta-package (not shipped on
# EPEL 10 and dropped from EPEL 9 in favor of ansible-core).
- name: "[RedHat] Install ansible-core"
  ansible.builtin.dnf:
    name:
      - ansible-core
      - git
    state: present
