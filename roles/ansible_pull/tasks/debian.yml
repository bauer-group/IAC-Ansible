---
# =============================================================================
# Ansible-Pull - Debian/Ubuntu: Install Ansible
# =============================================================================
# PPA usage:
#   - Ubuntu 22.04 (jammy): universe ships ansible-core 2.12 → too old for
#     min_ansible_version 2.18 → PPA required.
#   - Ubuntu 24.04 (noble): universe ships ansible-core 2.16 → still too old
#     for min_ansible_version 2.18 → PPA required.
#   - Ubuntu 26.04+ (resolute, ...): universe ships ansible-core >= 2.18 →
#     PPA not needed. This is crucial because Ubuntu 26.04 removed apt-key
#     (see release notes) which the legacy "ppa:" shortcut relied on.
#   - Debian: main ships modern enough ansible-core.
#
# Key handling: modern signed-by keyring pattern (compatible with all
# Ubuntu versions including 26.04, does not depend on deprecated apt-key).
# =============================================================================

- name: "[Ubuntu 22.04/24.04] Create keyrings directory for Ansible PPA"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    - ansible_facts['distribution_major_version'] in ["22", "24"]

- name: "[Ubuntu 22.04/24.04] Check Ansible PPA signing key presence"
  ansible.builtin.stat:
    path: /etc/apt/keyrings/ansible-ppa.asc
  register: ansible_pull_ppa_key_stat
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    - ansible_facts['distribution_major_version'] in ["22", "24"]

- name: "[Ubuntu 22.04/24.04] Fetch Ansible PPA signing key"
  ansible.builtin.get_url:
    url: "https://keyserver.ubuntu.com/pks/lookup?op=get&search=0x6125E2A8C77F2818FB7BD15B93C4A3FD7BB9C367"
    dest: /etc/apt/keyrings/ansible-ppa.asc
    mode: "0644"
  # get_url with force:false still probes the server and can report
  # changed=true when the upstream keyserver omits ETag/Last-Modified
  # headers. Gate the download explicitly on dest absence to guarantee
  # idempotence.
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    - ansible_facts['distribution_major_version'] in ["22", "24"]
    - not (ansible_pull_ppa_key_stat.stat.exists | default(false))

- name: "[Ubuntu 22.04/24.04] Add Ansible PPA repository (signed-by keyring)"
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/etc/apt/keyrings/ansible-ppa.asc]
      https://ppa.launchpadcontent.net/ansible/ansible/ubuntu
      {{ ansible_facts['distribution_release'] }} main
    filename: ansible-ppa
    state: present
  when:
    - ansible_facts['distribution'] == "Ubuntu"
    - ansible_facts['distribution_major_version'] in ["22", "24"]

- name: "[Debian] Update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "[Debian] Install Ansible"
  ansible.builtin.apt:
    name:
      - ansible
      - git
    state: present
