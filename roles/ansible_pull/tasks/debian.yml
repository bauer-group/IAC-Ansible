---
# =============================================================================
# Ansible-Pull - Debian/Ubuntu: Install Ansible
# =============================================================================

- name: "[Debian] Check if Ansible PPA is already configured"
  ansible.builtin.shell: >-
    grep -rqs 'ansible/ansible' /etc/apt/sources.list.d/ && echo "present" || echo "absent"
  register: ansible_pull_ppa_check
  changed_when: false
  when: ansible_distribution == "Ubuntu"

- name: "[Debian] Add Ansible PPA (Ubuntu)"
  ansible.builtin.apt_repository:
    repo: "ppa:ansible/ansible"
    state: present
  when:
    - ansible_distribution == "Ubuntu"
    - ansible_pull_ppa_check.stdout | default('absent') == "absent"

- name: "[Debian] Update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "[Debian] Install Ansible"
  ansible.builtin.apt:
    name:
      - ansible
      - git
    state: present
