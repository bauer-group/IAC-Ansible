# =============================================================================
# Host: 0011-68.cloud.bauer-group.com
# Asset: 0011 | Group: 68 (Test / Sandbox)
# Role : k0s controller+worker (BOOTSTRAP node for cluster staging-test-5node)
# =============================================================================
# Provider: VPS (Public Cloud)
# OS: Ubuntu 24.04 LTS — HWE kernel track (newer kernel than Debian 13)
# Verify after provisioning: `uname -r` should show 6.11+ (HWE), not 6.8 (GA).
# If GA kernel is shipped, install: apt install linux-generic-hwe-24.04

# Platform
platform: ubuntu_2404

# Asset metadata
asset_id: "0011"
group_code: "68"
asset_type: test_sandbox

# Labels
labels:
  - test
  - public-cloud
  - ubuntu
  - k0s
  - k0s-bootstrap

# Override: use main branch until staging branch exists
iac_repo_branch: "main"

# k0s — bootstrap node for staging-test-5node
# This is the ONLY host in the cluster with k0s_bootstrap_node: true.
# Overlay address auto-derived from asset_id (10.99.0.11/24).
# Public endpoint auto-derived from ansible_default_ipv4 (VPS public IP).
k0s_bootstrap_node: true
k0s_enabled: false   # flip to true to activate the cluster rollout
