---
# =============================================================================
# Docker Hosts (STAGING) - Group Variables
# =============================================================================
# Override role defaults for all hosts in the docker_hosts group on staging.
# Per-host overrides go in host_vars/<hostname>.yml

# Drain old docker0 + user-defined networks on every deploy so the new
# IPv6 ranges from docker_daemon_options actually take effect on the
# disposable Group-68 boxes. Production keeps this at the role default
# (false) and migrates manually inside maintenance windows.
docker_migrate_subnets: true
