---
# =============================================================================
# IAC-Ansible Staging Inventory
# =============================================================================
# Usage: make deploy ENV=staging

all:
  vars:
    ansible_user: root
    ansible_python_interpreter: auto_silent

  children:
    # Asset Type Groups
    dev_test:
      hosts:
        0001-68.cloud.bauer-group.com:

    # Platform Groups
    debian:
      children:
        debian_13:
          hosts:
            0001-68.cloud.bauer-group.com:

    # Functional Groups
    auto_update:
      hosts:
        0001-68.cloud.bauer-group.com:

    docker_hosts:
      hosts:
        0001-68.cloud.bauer-group.com:

    # =========================================================================
    # k0s Kubernetes Clusters (staging)
    # =========================================================================
    # Sandbox 1-node cluster on the existing dev_test host. To activate, also
    # set the cluster vars in host_vars/0001-68.cloud.bauer-group.com.yml:
    #   k0s_role: "controller+worker"
    #   k0s_bootstrap_node: true
    #   k0s_overlay_address: "10.99.0.1/24"
    #   k0s_overlay_public_endpoint: "<public-ip>:51820"
    k0s_clusters:
      children:
        k0s_cluster_staging_sandbox:
          hosts:
            0001-68.cloud.bauer-group.com:
          vars:
            k0s_cluster_id: "staging-sandbox"
            k0s_network_mode: "overlay"
            k0s_overlay_subnet: "10.99.0.0/24"
            k0s_enabled: false   # opt-in per sandbox-rollout

    k0s_cluster:
      children:
        k0s_clusters:
