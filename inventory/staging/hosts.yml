---
# =============================================================================
# IAC-Ansible Staging Inventory
# =============================================================================
# Usage: make deploy ENV=staging

all:
  vars:
    ansible_user: root
    ansible_python_interpreter: auto_silent

  children:
    # Asset Type Groups
    dev_test:
      hosts:
        0001-68.cloud.bauer-group.com:
        0011-68.cloud.bauer-group.com:
        0012-68.cloud.bauer-group.com:
        0013-68.cloud.bauer-group.com:
        0014-68.cloud.bauer-group.com:
        0015-68.cloud.bauer-group.com:

    # Platform Groups
    debian:
      children:
        debian_13:
          hosts:
            0001-68.cloud.bauer-group.com:

    ubuntu:
      children:
        ubuntu_2404:
          hosts:
            0011-68.cloud.bauer-group.com:
            0012-68.cloud.bauer-group.com:
            0013-68.cloud.bauer-group.com:
            0014-68.cloud.bauer-group.com:
            0015-68.cloud.bauer-group.com:

    # Functional Groups
    auto_update:
      hosts:
        0001-68.cloud.bauer-group.com:
        0011-68.cloud.bauer-group.com:
        0012-68.cloud.bauer-group.com:
        0013-68.cloud.bauer-group.com:
        0014-68.cloud.bauer-group.com:
        0015-68.cloud.bauer-group.com:

    docker_hosts:
      hosts:
        0001-68.cloud.bauer-group.com:

    # =========================================================================
    # k0s Kubernetes Clusters (staging)
    # =========================================================================
    # Public-network 5-node cluster (no shared switch, no VLANs). Overlay
    # mode: WireGuard full-mesh acts as the cluster's soft "vSwitch" over
    # public IPs. 5 nodes give a 3-quorum etcd that tolerates 2 simultaneous
    # node failures.
    #
    # Bootstrap node: 0011-68 (carries k0s_bootstrap_node: true in host_vars).
    # Overlay IPs are auto-derived from asset_id:
    #   0011 -> 10.99.0.11   0014 -> 10.99.0.14
    #   0012 -> 10.99.0.12   0015 -> 10.99.0.15
    #   0013 -> 10.99.0.13
    k0s_clusters:
      children:
        k0s_cluster_test_5node:
          hosts:
            0011-68.cloud.bauer-group.com:
            0012-68.cloud.bauer-group.com:
            0013-68.cloud.bauer-group.com:
            0014-68.cloud.bauer-group.com:
            0015-68.cloud.bauer-group.com:
          vars:
            k0s_cluster_id: "staging-test-5node"
            k0s_network_mode: "overlay"
            k0s_overlay_subnet: "10.99.0.0/24"
            k0s_role: "controller+worker"

    k0s_cluster:
      children:
        k0s_clusters:
