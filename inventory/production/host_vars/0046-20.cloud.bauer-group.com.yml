---
# =============================================================================
# Host: 0046-20.cloud.bauer-group.com
# Asset: 0046 | Group: 20 (Public Cloud)
# =============================================================================
# Purpose: Coolify application platform.
#
# This host_vars file is written so that a full run of `playbooks/site.yml`
# either retrofits an already-configured host (no disruption) OR provisions
# a blank Ubuntu 24.04 from scratch to the same end state. Every role it
# drives is idempotent — running it repeatedly converges on the same result.
#
# Intentionally not captured here: provider, hardware model, MAC address,
# IP addresses. Those belong to the host itself, not the version-controlled
# inventory.

platform: ubuntu_2404

asset_id: "0046"
group_code: "20"
asset_type: coolify_host

labels:
  - production
  - public-cloud
  - ubuntu
  - docker-host
  - coolify

# Branch override (staging group_vars bleed into production via merged inventory)
iac_repo_branch: "main"

# --- Hostname ---
# Set by default (idempotent); kept here explicit so a fresh-install run is
# guaranteed to name the host correctly before services come up.
common_hostname_configure: true

# --- UFW firewall ---
# Docker manages its own iptables rules; UFW conflicts with container
# networking. Match the manual Docker-host setup by ensuring UFW is disabled.
common_firewall_ufw_state: "disabled"

# --- AppArmor ---
# Stays at the global default (disabled + masked).

# --- Netplan (optional) ---
# Enable only if additional/missing IPs need to be set. Empty override lists
# keep the current running config active; *_extra lists are always appended.
# Safety: the role takes a backup, schedules a systemd rollback timer, applies
# the change, runs a connectivity test, and only cancels the rollback on
# success. No manual apply required, no lockout risk.
#
# common_netplan_configure: true
# common_netplan_ipv4_extra:
#   - "<additional-ipv4>/<prefix>"
# common_netplan_ipv6_extra:
#   - "<additional-ipv6>/<prefix>"

# --- Coolify ---
# Installer runs only when /data/coolify is missing. On the already-running
# host it is a no-op; on a fresh-install run it deploys Coolify end-to-end.
# No override needed — stays at the role default.
