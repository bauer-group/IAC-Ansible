---
# =============================================================================
# Secrets Backend Configuration
# =============================================================================
# Toggle between "ansible-vault" and "hashicorp-vault".
# Default: ansible-vault (file-based, works offline, no extra dependencies).
#
# To switch to HashiCorp Vault:
#   1. Set secrets_backend: "hashicorp-vault"
#   2. Set secrets_vault_addr to your Vault server URL
#   3. Deploy AppRole credentials to /etc/iac-ansible/ on each host
#   4. Run: make deploy
# =============================================================================

secrets_backend: "ansible-vault"

# --- HashiCorp Vault settings (only used when secrets_backend == "hashicorp-vault") ---
secrets_vault_addr: ""
secrets_vault_auth_method: "approle"
secrets_vault_role_id_file: "/etc/iac-ansible/vault-role-id"
secrets_vault_secret_id_file: "/etc/iac-ansible/vault-secret-id"
secrets_vault_secret_path: "iac-ansible/shared"
secrets_vault_mount_point: "secret"
secrets_vault_ca_cert: ""
