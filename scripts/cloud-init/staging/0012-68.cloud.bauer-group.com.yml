#     bash
# =============================================================================

#cloud-config

hostname: 0012-68
fqdn: 0012-68.cloud.bauer-group.com
preserve_hostname: false
manage_etc_hosts: true

timezone: Etc/UTC

package_update: true
package_upgrade: false
packages:
  - curl
  - git
  - ca-certificates

runcmd:
  - |
    curl -fsSL https://raw.githubusercontent.com/bauer-group/IAC-Ansible/main/scripts/install.sh | \
      IAC_HOSTNAME=0012-68.cloud.bauer-group.com \
      INVENTORY=inventory/staging/hosts.yml \
      BRANCH=main \
      bash

final_message: |
  IAC-Ansible bootstrap completed for 0012-68.cloud.bauer-group.com (staging, k0s joiner)
  Logs: /var/log/ansible/ansible-pull.log
  Timer: systemctl status ansible-pull.timer
