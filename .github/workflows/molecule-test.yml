---
name: 🧪 Molecule Tests

on:
  push:
    branches: [main, staging]
    paths:
      - 'roles/**'
      - 'requirements.yml'
      - 'requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'roles/**'

permissions:
  contents: read

jobs:
  molecule:
    name: 🔬 ${{ matrix.role }} (${{ matrix.scenario }})
    # runs-on: ubuntu-latest
    runs-on: '["self-hosted", "linux"]'
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - role: common
            scenario: default
          - role: ansible_pull
            scenario: default
          - role: auto_update
            scenario: default
          - role: docker
            scenario: default
          - role: smartmon
            scenario: default
          - role: coolify
            scenario: default
          - role: secrets
            scenario: default
          - role: k0s
            scenario: default
          - role: k0s
            scenario: overlay

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📚 Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: 🧪 Run Molecule tests
        working-directory: roles/${{ matrix.role }}
        run: |
          molecule test -s ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: "true"
          PY_COLORS: "1"
