---
name: 🧪 Molecule Tests

on:
  push:
    branches: [main, staging]
    paths:
      - 'roles/**'
      - 'requirements.yml'
      - 'requirements.txt'
  pull_request:
    branches: [main]
    paths:
      - 'roles/**'
  # Manual trigger — re-run after upstream mirror outages, validate hot-fixes,
  # or test a single role on demand without a code push.
  workflow_dispatch:
    inputs:
      role:
        description: "Role to test (leave 'all' to run the full matrix)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - common
          - ansible_pull
          - auto_update
          - docker
          - smartmon
          - coolify
          - secrets
          - k0s
          - secondary_dns
      verbose:
        description: "Run with -vvv to expose stderr from failed connection attempts"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  molecule:
    name: 🔬 ${{ matrix.role }} (${{ matrix.scenario }})
    # runs-on: ubuntu-latest
    runs-on: [self-hosted, linux]
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - role: common
            scenario: default
          - role: ansible_pull
            scenario: default
          - role: auto_update
            scenario: default
          - role: docker
            scenario: default
          - role: smartmon
            scenario: default
          - role: coolify
            scenario: default
          - role: secrets
            scenario: default
          - role: k0s
            scenario: default
          - role: k0s
            scenario: overlay

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📚 Install Ansible collections
        run: |
          ansible-galaxy collection install -r requirements.yml --force

      - name: 🧪 Run Molecule tests
        # Manual single-role runs: skip the test when this matrix entry isn't
        # the selected role. Auto-triggers (push/PR) and 'all' run everything.
        # The `matrix` context is only available at step level, not job level —
        # so we skip the heavy step rather than the whole job.
        if: >-
          github.event_name != 'workflow_dispatch'
          || inputs.role == 'all'
          || inputs.role == matrix.role
        working-directory: roles/${{ matrix.role }}
        run: |
          molecule ${{ inputs.verbose && '--debug' || '' }} test -s ${{ matrix.scenario }}
        env:
          ANSIBLE_FORCE_COLOR: "true"
          PY_COLORS: "1"
          # Self-hosted runner workaround:
          # 1. The managed-node containers may not have a writeable home dir
          #    for the SSH user, so the default ~/.ansible/tmp creation fails.
          # 2. /tmp is mounted as tmpfs in every molecule.yml platform block
          #    (`tmpfs: [/run, /tmp]`). On nested-DinD with cgroup memory
          #    limits the visible RAM is small, so tmpfs /tmp is small too,
          #    and apt installs blow it out → mkdir under /tmp fails ENOSPC.
          # /var/tmp is NOT in the tmpfs list → uses the container overlay
          # filesystem → effectively unlimited within the DinD volume.
          ANSIBLE_REMOTE_TMP: "/var/tmp/.ansible"
