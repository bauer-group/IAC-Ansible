name: 🔍 Ansible Lint

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]
  # Manual trigger — re-validate after upstream tooling updates or
  # debug lint configuration changes without needing a code push.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: 🧹 Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🐍 Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 📋 Run yamllint
        run: |
          yamllint -c .yamllint .

      - name: 🔎 Run ansible-lint
        run: |
          ansible-lint playbooks/ roles/
