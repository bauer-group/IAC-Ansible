---
# =============================================================================
# IAC-Ansible: Master Playbook (site.yml)
# =============================================================================
# This is the main entry point for all configuration management.
# It applies roles based on group membership.
#
# Usage:
#   ansible-playbook playbooks/site.yml                          # All hosts
#   ansible-playbook playbooks/site.yml --limit "host1"          # Specific host
#   ansible-playbook playbooks/site.yml --limit "*.bauer-group.com"  # Wildcard
#   ansible-playbook playbooks/site.yml --tags "update"          # Specific tags
#   make deploy LIMIT="0046-20.cloud.bauer-group.com"            # Via Makefile
# =============================================================================

# --- Phase 0: Secrets resolution (all hosts) ---
- name: "Phase 0: Resolve secrets from configured backend"
  hosts: all
  become: true
  gather_facts: false
  tags: [always]

  roles:
    - role: secrets
      tags: [always, secrets]

# --- Phase 1: Common baseline for all hosts ---
- name: "Phase 1: Common baseline configuration"
  hosts: all
  become: true
  gather_facts: true
  tags: [common, always-gather]

  pre_tasks:
    - name: Validate Ansible version
      ansible.builtin.assert:
        that: ansible_version.full is version('2.18', '>=')
        msg: "Ansible-core 2.18+ required (ansible >= 13.0). Found: {{ ansible_version.full }}"

    - name: Display target information
      ansible.builtin.debug:
        msg: "Configuring {{ inventory_hostname }} ({{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }})"

    # Dynamic label/service filtering
    - name: Skip host if label filter doesn't match
      ansible.builtin.meta: end_host
      when:
        - filter_label is defined
        - labels is defined
        - filter_label not in labels

  roles:
    - role: common
      tags: [common]

# --- Phase 2: ansible-pull setup (all hosts) ---
- name: "Phase 2: ansible-pull configuration"
  hosts: all
  become: true
  gather_facts: true
  tags: [ansible-pull, pull]

  roles:
    - role: ansible_pull
      tags: [ansible-pull, pull]

# --- Phase 3: Auto-update for designated hosts ---
- name: "Phase 3: Automatic updates"
  hosts: auto_update
  become: true
  gather_facts: true
  tags: [update, auto-update]

  roles:
    - role: auto_update
      tags: [update, auto-update]

# --- Phase 4: Docker for designated hosts ---
- name: "Phase 4: Docker runtime"
  hosts: docker_hosts
  become: true
  gather_facts: true
  tags: [docker]

  roles:
    - role: docker
      tags: [docker]

# --- Phase 5: SMART monitoring for physical servers ---
- name: "Phase 5: Disk health monitoring"
  hosts: physical_servers
  become: true
  gather_facts: true
  tags: [smartmon, monitoring]

  roles:
    - role: smartmon
      tags: [smartmon, monitoring]

# --- Phase 6: Coolify for designated hosts ---
- name: "Phase 6: Coolify platform"
  hosts: coolify_hosts
  become: true
  gather_facts: true
  tags: [coolify]

  roles:
    - role: coolify
      tags: [coolify]

# --- Phase 6a: Traefik edge proxy for designated hosts ---
- name: "Phase 6a: Traefik edge proxy"
  hosts: traefik_hosts
  become: true
  gather_facts: true
  tags: [traefik]

  roles:
    - role: traefik
      tags: [traefik]

# --- Phase 7: k0s Kubernetes for designated cluster nodes ---
- name: "Phase 7: k0s cluster nodes"
  hosts: k0s_cluster
  become: true
  gather_facts: true
  tags: [k0s]

  pre_tasks:
    - name: Skip host when k0s disabled
      ansible.builtin.meta: end_host
      when: not (k0s_enabled | default(true) | bool)

  roles:
    - role: k0s
      tags: [k0s]

# --- Phase 8: PowerDNS authoritative secondaries ---
- name: "Phase 8: PowerDNS secondary DNS"
  hosts: secondary_dns
  become: true
  gather_facts: true
  tags: [secondary_dns, dns]

  roles:
    - role: secondary_dns
      tags: [secondary_dns, dns]
